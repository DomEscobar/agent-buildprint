name: route-contracts

cases:
  - name: graph starts at classify
    given:
      current: start
      state:
        messages: []
        done: false
        stepCount: 0
    expect_next: classify

  - name: classify routes to retrieve
    given:
      current: classify
      state:
        messages: []
        done: false
        stepCount: 1
        intent: explain_blueprint
    expect_next: retrieve

  - name: retrieve routes to answer
    given:
      current: retrieve
      state:
        messages: []
        done: false
        stepCount: 2
        intent: explain_blueprint
        context: ["snippet"]
    expect_next: answer

  - name: answer ends when done true
    given:
      current: answer
      state:
        messages: []
        done: true
        stepCount: 3
    expect_next: end

  - name: answer loops when done false
    given:
      current: answer
      state:
        messages: []
        done: false
        stepCount: 3
    expect_next: classify
