name: langgraph-style-vanilla-ts-agent-contract
version: 0.1.0
positioning: Portable architecture contract for AI-generated LangGraph-style agents.

promise:
  - Give AI coding agents a stable architecture contract.
  - Generate ordinary Vanilla TypeScript, not framework-locked runtime code.
  - Validate the contract and generated code with lightweight checks.

non_goals:
  - Not a runtime framework.
  - Not a YAML programming language.
  - Not a replacement for TypeScript types or tests.
  - Not a hidden LangGraph clone.

mvp_commands:
  check_contract: agent-buildprint check ./langgraph
  check_generated_code: agent-buildprint check ./langgraph --code ./generated-agent

success_metric:
  - A coding agent can generate a local TS graph runner from this folder.
  - agent-buildprint check catches missing referenced files, underspecified nodes, unknown routes, and forbidden framework imports.
