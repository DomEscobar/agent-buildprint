side_effect_policy:
  default: deny
  rule: Nodes must declare every side effect in blueprint.yaml.
  external_writes_require_human_interrupt: true

side_effect_types:
  docs.read:
    risk: low
    approval_required: false
  llm.call:
    risk: medium
    approval_required: false
  external_write:
    risk: high
    approval_required: true
  delete:
    risk: high
    approval_required: true
  purchase:
    risk: high
    approval_required: true
  public_post:
    risk: high
    approval_required: true

tools:
  docs.search:
    description: Search local or project documentation.
    input:
      query: string
      limit: number
    output:
      results: string[]
    side_effects:
      - docs.read
