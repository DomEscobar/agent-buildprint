schema_version: mapper-os/executable-blueprint
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
claim_status: product_build_required
qualification_label: local_build_requires_review
setup_tier: typed_product_leadership
deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp
blueprint_mode:
  primary: product
  consumer: end_user
  selected_spine: product_app_consumer_first
  allowed_spines:
    - product_app_consumer_first
    - developer_first_framework
    - reliability_first_service
    - automation_task_loop
    - data_pipeline_quality_loop
    - infrastructure_operations_loop
    - mixed
agent_contract:
  role: Senior Product Engineer
  rule: Build a trusted-local product loop with explicit non-production blockers.
selected_scope:
  name: MiroFish OSS Graph-Memory Swarm Workbench
  promise: Build a swarm prediction workbench with a high-quality graph canvas, OSS graph memory, configurable AI provider, simulation, reporting, and interaction path.
  central_artifact: Interactive graph-centered simulation workbench
  first_success_loop: Upload or load seed data, build an OSS-backed graph, inspect it in the canvas, persist and reload state, then reach simulation setup with honest provider status.
  required_replacements:
    - Replace Zep Cloud with OSS graph-memory adapter.
    - Replace Zep-specific service/config names in the product contract.
    - Preserve OpenAI-compatible provider independence for LLM calls.
read_order:
  - BUILDPRINT.md
  - 01-questions.md
  - generated/agent-prompt.md
  - 02-project-setup.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - 04-review.md
  - 05-handover.md
implementation_loop:
  phase_flow: 03-phases/phase-flow.md
  active_phase: 03-phases/00-product-system-alignment.md
  final_review: 04-review.md
  handover: 05-handover.md
repair_routing:
  product_contradiction: BUILDPRINT.md
  setup_or_architecture_gap: 02-project-setup.md
  phase_gap: current_phase
  review_gap: 04-review.md
  handover_gap: 05-handover.md
provider_boundaries:
  llm:
    default_contract: OpenAI-compatible key/base_url/model
    hard_rule: provider credentials missing means blocked live proof, not fake success
  graph_memory:
    default_family: Graphiti-style OSS temporal graph memory
    required_adapter: GraphMemoryPort
    zep_cloud_required: false
hardening_status:
  auth_and_tenancy: included_blocked
  observability_and_health: included_blocked
  deployment_and_operability: included_blocked
  ci_and_release_gates: included_blocked
  backup_and_recovery: included_blocked
  security_and_abuse_controls: included_blocked
