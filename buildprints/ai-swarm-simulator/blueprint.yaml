schema_version: mapper-os/executable-blueprint/v3
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
schema_role: "YAML routes; markdown teaches and builds"

product:
  name: MiroFish Social Simulation Studio
  inspiration: MiroFish / Microfish 666 social simulation engine
  central_artifact: graph-backed social simulation studio with postable outcome artifacts
  golden_path: choose seed scenario -> map the social world -> run local/provider social simulation -> inspect simulated posts/feed -> generate story/report -> export postable thread/artifact -> save/continue project
  primary_audience_default: non-technical first-time user
  novice_workflow: start -> map -> run -> feed -> story -> projects
  required_views:
    - Start
    - Map
    - Run
    - Feed
    - Story
    - Projects
  required_example_scenarios:
    - Simulate a breaking-news public reaction
    - Simulate a startup launch going viral
    - Simulate a fictional-world controversy
  required_social_platform_surfaces:
    - Twitter-style agent feed
    - Reddit-style discussion thread
    - timeline of agent actions
    - postable thread/story export

required_files:
  - BUILDPRINT.md
  - 00-questions.md
  - 01-project-setup.md
  - 02-uiux-decision.md
  - blueprint.yaml
  - enhancement-gaps.md
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - HANDOVER.md

forbidden_shapes:
  - slices/
  - gates/
  - generated/agent-prompt.md
  - generated/codex-handoff.md
  - templates/runner/
  - templates/teams/
  - 02-architecture.md
  - 03-ux-contract.md
  - 04-handover.md

deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp

runtime_contract:
  graph_memory: open-source adapter, Graphiti default, Zep Cloud not required
  provider: OpenAI-compatible runtime config with status/test behavior
  simulation: local OASIS-style social simulation seam or honest blocked state
  social_feed: simulated posts, comments, reactions, reposts, agent stances, and timeline events derived from the active run
  publishing: exportable post/thread/story artifact; real X/Twitter posting only behind explicit user-controlled config and honest proof
  ui: example-first multi-view social simulation studio with polished graph canvas, working feed/story controls, progressive technical details, and clear blocked/error states

production_quality_gates:
  server_secret_boundary: required before provider-backed production claims
  provider_probe: required before live AI service claims
  real_runtime: required before real social simulation claims
  social_feed_truthfulness: required before claiming simulated social behavior
  post_export: required before claiming content/publishing value
  durable_persistence: required before durable project claims
  external_graph_memory: required before Graphiti/external memory claims
  accessibility_large_graph_stress: required before production UX claims
  auth_privacy_observability_deployment: required before private or public deployment claims

phase_flow: 03-phases/phase-flow.md
phase_index: 03-phases/phase-index.yaml
handover: HANDOVER.md
