schema_version: mapper-os/executable-blueprint/v3
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
schema_role: "YAML routes; markdown teaches and builds"

product:
  name: AI Swarm Simulator
  central_artifact: graph-backed swarm simulation workbench
  golden_path: upload seed material -> graph memory -> canvas inspection -> simulation -> report -> continued interaction

required_files:
  - BUILDPRINT.md
  - 00-questions.md
  - 01-project-setup.md
  - 02-uiux-decision.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - HANDOVER.md

forbidden_shapes:
  - slices/
  - gates/
  - generated/agent-prompt.md
  - generated/codex-handoff.md
  - templates/runner/
  - templates/teams/
  - 02-architecture.md
  - 03-ux-contract.md
  - 04-handover.md

deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp

runtime_contract:
  graph_memory: open-source adapter, Graphiti default, Zep Cloud not required
  provider: OpenAI-compatible runtime config with status/test behavior
  simulation: local OASIS-style seam or honest blocked state
  ui: polished graph canvas with working controls and clear blocked/error states

phase_flow: 03-phases/phase-flow.md
phase_index: 03-phases/phase-index.yaml
handover: HANDOVER.md
