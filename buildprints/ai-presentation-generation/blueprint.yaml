schema_version: mapper-os/executable-blueprint
source:
  origin_github_url: https://github.com/presenton/presenton
  origin_label: presenton/presenton
  observed_commit: 493aff5c764c13f7249a9a908fe41aa85c19b7c3
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
claim_status: product_build_required
qualification_label: local_build_requires_review
setup_tier: typed_product_leadership
deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp
execution_cadence:
  current: all_remaining
  allowed_values:
    - one_phase
    - to_checkpoint
    - all_remaining
blueprint_mode:
  primary: product
  consumer: end_user
  selected_spine: product_app_consumer_first
  allowed_spines:
    - product_app_consumer_first
    - developer_first_framework
    - reliability_first_service
    - automation_task_loop
    - data_pipeline_quality_loop
    - infrastructure_operations_loop
    - mixed
agent_contract:
  role: Senior Product Engineer
  rule: Build the trusted-local presentation product loop honestly; report provider/export/API blockers explicitly.
read_order:
  - BUILDPRINT.md
  - 01-questions.md
  - generated/agent-prompt.md
  - 02-project-setup.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - 04-review.md
  - 05-handover.md
implementation_loop:
  phase_flow: 03-phases/phase-flow.md
  active_phase: 03-phases/00-product-system-alignment.md
  final_review: 04-review.md
  handover: 05-handover.md
repair_routing:
  product_contradiction: BUILDPRINT.md
  setup_or_architecture_gap: 02-project-setup.md
  phase_gap: current_phase
  review_gap: 04-review.md
  handover_gap: 05-handover.md
purpose:
  summary: Build a trusted-local Presenton-inspired AI presentation generator with editable deck workbench, BYOK providers, templates/assets, export, API, webhooks, MCP, and desktop boundaries.
runtime:
  frontend: Browser workbench with deck canvas, thumbnails, outline, assets, chat, and export center.
  backend: API plus worker/export runtime for generation, parsing, storage, export, webhooks, and MCP seams.
  providers: OpenAI-compatible text provider first, with explicit seams for Gemini, Anthropic, Azure, Bedrock, Vertex, Fireworks, Together, LM Studio, Ollama, and custom endpoints.
state:
  durable:
    - provider/image/export configuration metadata without secret leakage
    - uploaded source documents and extraction status
    - deck outline, slides, layouts, notes, assets, themes, templates
    - chat iterations and generation traces scoped to the deck
    - export tasks, files, API tasks, and webhook delivery attempts
  local_only:
    - provider credentials
    - local model endpoints
    - export runtime paths
nodes:
  configure_runtime:
    output: provider, image, storage, export, and privacy readiness
  ingest_content:
    input: prompt, document, or template
    output: extracted content, outline candidates, and blockers
  generate_deck:
    input: outline, template, theme, provider config
    output: persisted editable deck model
  edit_workbench:
    input: deck state
    output: slide edits, asset changes, chat revisions
  export_integrate:
    input: deck state
    output: PPTX/PDF files, API task status, webhook events, MCP/desktop seams
