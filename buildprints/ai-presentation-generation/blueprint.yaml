product:
  name: Presenton-style private AI presentation workbench
  summary: Build a self-hostable presentation generator where users configure their own model providers, create decks from prompts or uploaded documents, review outlines, choose templates, edit slides, refine with chat, and export editable PPTX/PDF artifacts.
  central_artifact: Editable presentation deck with persisted slides, theme/template structure, generated assets, chat-edit history, and downloadable PPTX/PDF exports.
  primary_users:
    - private individuals generating local decks
    - teams self-hosting AI presentation workflows
    - developers/operators exposing generation through API or desktop packaging
  golden_path:
    - configure or validate text and image provider settings
    - create a presentation from prompt and/or uploaded document
    - stream and review outline
    - select built-in or custom template
    - generate editable slides
    - inspect, reorder, add, and inline-edit slides
    - refine slide content through chat
    - export PPTX and PDF
    - reopen the persisted deck and downloaded artifacts
  secondary_paths:
    - dashboard list/delete/reopen presentations
    - custom template creation/import/editing
    - theme generation and selection
    - local provider/Ollama model handling
    - webhook/API generation and export
    - desktop packaging seam

central_output_contract:
  rule: Preserve the source-derived central output contract before implementation begins.
  central_output: Editable presentation deck with persisted slides, theme/template structure, generated assets, chat-edit history, and downloadable PPTX/PDF exports.
  output_primitives:
    - presentation record
    - ordered slide records
    - outline and title
    - selected template/layout group
    - slide content JSON and rendered slide surface
    - theme and font data
    - generated/reused image assets
    - chat edit trace
    - PPTX/PDF export file
  quality_signals:
    - deck content reflects prompt, uploaded documents, instructions, language, tone, verbosity, and slide count
    - outline has a coherent narrative sequence and can be edited before generation
    - selected template changes slide structure, not just colors
    - generated slides are visually inspectable and editable, with no clipped or overlapping core content in proof fixtures
    - exports reopen as real files and preserve the user-visible deck enough to be useful
    - provider failures identify missing key/model/endpoint instead of failing generically
    - persisted readback restores the same deck order, content, theme, and assets
  unacceptable_generic_substitutes:
    - prompt produces interchangeable business slides unrelated to source input
    - uploaded document text is ignored
    - outline exists only as raw JSON or cannot be edited
    - export button downloads a placeholder or static sample
    - template choice does not affect layout/theme
    - chat says it edited a slide but the slide does not change
    - provider calls are mocked while UI labels imply live model output
  reviewer_acceptance_questions:
    - Can a skeptical user trace how their input shaped the outline and final slides?
    - Can the user edit and reorder the generated deck before export?
    - Does exported PPTX/PDF match the visible deck enough for real handoff?
    - Does the app fail closed when model/image/export credentials or runtimes are missing?
    - Does a reload preserve the presentation state and assets?

runtime:
  posture_defaults:
    local: trusted_local
    server: private_authenticated
  persistence:
    sql_required: true
    file_storage_required: true
    config_file_required: true
    in_memory_only_allowed: false
  providers:
    text_provider_seam_required: true
    image_provider_seam_required: true
    deterministic_mode_allowed_for_proof: true
    live_provider_claim_requires_credentials: true
  export_runtime:
    pptx_required: true
    pdf_required: true
    browser_or_converter_required: true
    placeholder_export_forbidden: true
  auth:
    setup_login_logout_required: true
    disable_auth_allowed_only_for_trusted_local: true
  uploads:
    supported_categories:
      - prompt
      - pdf
      - text
      - word_processing
      - presentation
      - spreadsheet
      - image

proven_implementation_requirements:
  rule: Hard product domains must use proven libraries, SDKs, runtimes, or platform services unless a from-scratch alternative is explicitly justified and proven against the same acceptance criteria. Keep the packet stack-neutral, but do not let builders casually hand-roll fixed-format export, rich editing, document parsing, drag interactions, chart rendering, provider clients, task orchestration, or migrations.
  editable_slide_rendering:
    requirement: Use a structured rendering/editing approach that preserves slide layout, editable content fields, theme/font separation, aspect-ratio framing, and persisted readback.
    acceptable_patterns:
      - React/Vue/Svelte component template system with structured slide JSON
      - rich text editor framework for inline text where rich editing is claimed
      - schema-validated template/layout compiler
    casual_hand_roll_forbidden: true
  rich_text_and_inline_editing:
    requirement: Use a proven editor framework or a narrowly scoped structured input model; plain textareas are acceptable only for simple fields and must not be claimed as rich slide editing.
    examples:
      - TipTap/ProseMirror
      - Lexical
      - Slate
      - structured custom controls for bounded title/body/image/icon fields
  fixed_format_export:
    requirement: Use a real PPTX/PDF export library or browser/converter runtime; exported files must be generated from persisted deck state and inspected before fidelity claims.
    examples:
      - pptxgenjs
      - python-pptx
      - Playwright/Puppeteer browser-to-PDF
      - LibreOffice/UNO or a dedicated conversion service
      - dedicated presentation-export runtime
    forbidden:
      - placeholder files
      - screenshot-only PPTX when editable PPTX is claimed
      - download routes that bypass export-directory constraints
  document_extraction:
    requirement: Use established parsers/extractors for PDF, Office, spreadsheet, text, and image/OCR inputs as applicable; uploaded document content must affect the generated outline/deck.
    examples:
      - pdfplumber or equivalent PDF parser
      - python-pptx or equivalent presentation parser
      - xlsx/csv parser
      - OCR library/service only when image text extraction is claimed
  drag_reorder_and_canvas_interaction:
    requirement: Use a proven drag/drop or interaction library for slide reorder and complex pointer behavior unless the custom implementation proves keyboard, pointer, focus, and persistence behavior.
    examples:
      - dnd-kit
      - React DnD
      - SortableJS
  charts_diagrams_and_visual_primitives:
    requirement: Use chart/diagram/rendering libraries for structured charts, diagrams, code blocks, and visual primitives where generated slides claim those capabilities.
    examples:
      - Chart.js
      - Recharts
      - Mermaid
      - SVG/canvas helpers with structured data contracts
  provider_abstraction:
    requirement: Define a local provider interface and use official SDKs or well-supported HTTP clients for live providers; provider-specific auth/model/error handling must not be scattered through UI code.
    live_claim_requires:
      - configured credentials or local provider runtime
      - model validation or explicit model selection
      - user-facing missing-key/model/endpoint errors
      - sample-output proof
  background_jobs_and_export_tasks:
    requirement: Use a real task/status model for generation, document extraction, local model pulls, webhooks, and export; heavier deployments may use a queue, but local proof still needs durable task state or honest blockers.
    acceptable_patterns:
      - SQL-backed task status
      - Redis/RQ/Celery
      - BullMQ
      - platform queue/service
      - explicit single-process local task model with persisted status
  persistence_and_migrations:
    requirement: Use a database layer with migrations or an explicit schema evolution path; browser-only or memory-only state is forbidden when durability is claimed.
    acceptable_patterns:
      - SQL ORM/query layer plus migrations
      - SQLite for trusted local proof
      - Postgres/MySQL for server deployment
      - file/object storage for uploads/assets/exports with database metadata

forbidden_shapes:
  - single prompt box with fake deck output
  - raw JSON as primary user-facing deck or outline
  - no-op provider settings
  - no-op export controls
  - mocked live-provider success
  - in-memory persistence when durability is claimed
  - template selection that does not change slide layout
  - chat response without persisted slide mutation
  - production-ready claim without live runtime proof
  - hand-rolled PPTX/PDF export without proof equal to a proven export runtime
  - hand-rolled document parsing without parser-level extraction proof
  - hand-rolled rich editor or drag/reorder interaction without accessibility and readback proof

harness:
  provider: agents
  profiles:
    - webapp
  required_skills:
    - setup-runbook
    - frontend-ui-product-design
    - subagent-driven-implementation
    - verify-and-review
    - webapp

typed_quality_gates:
  rule: Select only the gates that match the artifact type; do not copy every possible gate into every packet.
  ui_decision_precision:
    applies_when: artifact has human-facing UI, reports, generated outputs, visual workflows, forms, or operator surfaces
    requires:
      - explicit style direction and rejected adjacent styles
      - exact color tokens and status semantics
      - typography scale and usage
      - desktop/mobile layout model when responsive use is in scope
      - component and state language before UI implementation
  visual_viewport_acceptance:
    applies_when: artifact has responsive or browser/app UI
    requires:
      - desktop proof for the primary workflow
      - mobile or narrow-viewport proof when users may operate there
      - screenshot inspection for overlap, clipping, unreadable text, unreachable actions, and page-level horizontal overflow
  editor_stress_acceptance:
    applies_when: artifact renders editable, generated, document-like, fixed-format, long-form, visual, note, or report content
    requires:
      - long-title and long-body fixtures
      - fixed-surface framing or scroll ownership proof
      - edit/readback or state persistence proof when editing exists
  semantic_output_acceptance:
    applies_when: artifact generates, transforms, recommends, summarizes, analyzes, or composes output
    requires:
      - output-specificity check against central_output_contract
      - repeated-generic-output rejection
      - sample output review that states what the user/operator can do next
  integration_operator_acceptance:
    applies_when: artifact is a plugin, integration, CLI, service, worker, automation, API, or background job
    requires:
      - install/configure/first-action proof
      - error, retry, idempotency, logging, audit, and recovery expectations where relevant
      - explicit live-provider or external-side-effect blockers
  critical_review_pushback:
    applies_when: serious executable packet or user-facing artifact
    phase_id: 99-critical-review-pushback
    phase: 03-phases/critical-review-pushback.md
    pass_threshold: "42/50, no category below 4, no unresolved high-severity finding"
    repair_loop: "up to five flaw -> fix -> proof -> rescore iterations unless externally blocked"

proof_obligations:
  ui:
    desktop_browser_required: true
    mobile_upload_dashboard_required: true
    editor_mobile_scope: bounded_or_blocked
    no_overlap_no_clipping_required: true
    focus_and_keyboard_sanity_required: true
  generative:
    provider_mode_must_be_labeled: true
    repeated_generic_output_rejected: true
    sample_output_review_required: true
  editable_fixed_format:
    fixed_slide_surface_required: true
    long_content_stress_required: true
    edit_readback_required: true
    export_reopen_or_artifact_inspection_required: true
  service:
    api_contract_smoke_required: true
    webhook_or_task_status_blocker_if_unproven: true

routes:
  phase_index: 03-phases/phase-index.yaml
  phase_flow: 03-phases/phase-flow.md
  handover: HANDOVER.md
  claim_gates:
    - do not claim live provider quality until real credentials and sample outputs are reviewed
    - do not claim export fidelity until generated PPTX/PDF artifacts are inspected
    - do not claim persistence until deck, slides, assets, theme, and chat changes survive reload
  minimum_standard: The product path must produce an editable, inspectable, exportable deck that reaches the mapped artifact's quality bar, not merely output that depends on input.
