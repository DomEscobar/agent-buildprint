schema_version: mapper-os/executable-blueprint/v3
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
claim_status: product_build_required
qualification_label: local_build_requires_review

deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp

read_order:
  - BUILDPRINT.md
  - 00-questions.md
  - 01-project-setup.md
  - 02-ui-identity.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - README.md
  - HANDOVER.md

packet_shape:
  style: phase_driven_comprehensive
  principle: YAML routes; markdown teaches and builds.
  required_files:
    - BUILDPRINT.md
    - 00-questions.md
    - 01-project-setup.md
    - 02-ui-identity.md
    - blueprint.yaml
    - 03-phases/phase-index.yaml
    - 03-phases/phase-flow.md
    - README.md
    - HANDOVER.md

phase_contract:
  required_headings:
    - How to implement this phase
    - Building objective
    - DO NOT
    - Minimum proof before moving on
    - Handoff note
  rule: Each phase must contain one comprehensive, product-specific building objective. Do not decompose phase guidance into tiny schema sections or slice YAML.
  forbidden_shapes:
    - slices/
    - gates/
    - 02-architecture.md
    - 03-ux-contract.md
    - 04-handover.md
    - 04-review.md
    - 05-handover.md
    - generated/agent-prompt.md
    - generated/codex-handoff.md

agent_contract:
  role: Senior Product Engineer
  rule: Build the product loop honestly from comprehensive phase objectives. A phase is not complete from edits, prose, placeholders, mocks, or screenshots alone. Visible controls must work or block honestly; live/provider/deployment claims require matching proof.

harness:
  provider: agents
  profiles:
    - webapp
  selection_rule: Replace these template profiles with the selected artifact's needs. Use webapp for responsive UI/product surfaces, backend for APIs/data/migrations/security-heavy services, agentic for agent runtimes/tools/memory/subagent systems, and full only when broad coverage is explicitly worth the extra context.

central_output_contract:
  rule: Build the product loop around the selected central artifact and keep claims evidence-bound.
  central_output: Approved blog post package with source references, outline, draft, SEO metadata, claim validation, visual assets, and publishing handoff notes.
  output_primitives:
    - Approved blog post package with source references, outline, draft, SEO metadata, claim validation, visual assets, and publishing handoff notes.
  quality_signals:
    - output is specific to product input and useful to the operator
  unacceptable_generic_substitutes:
    - generic shell output that does not advance the selected artifact
  reviewer_acceptance_questions:
    - What does the output make clear that a generic shell would not?
    - What can the user/operator do next from the output?
    - Which quality claim remains unproven?
  claim_gates:
    - do not claim central output quality until reviewer acceptance questions are answered with proof
  minimum_standard: The product path must produce output that reaches the mapped artifact's quality bar, not merely output that depends on input.

typed_quality_gates:
  rule: Select only the gates that match the artifact type; do not copy every possible gate into every packet.
  ui_decision_precision:
    applies_when: artifact has human-facing UI, reports, generated outputs, visual workflows, forms, or operator surfaces
    requires:
      - explicit style direction and rejected adjacent styles
      - exact color tokens and status semantics
      - typography scale and usage
      - desktop/mobile layout model when responsive use is in scope
      - component and state language before UI implementation
  visual_viewport_acceptance:
    applies_when: artifact has responsive or browser/app UI
    requires:
      - desktop proof for the primary workflow
      - mobile or narrow-viewport proof when users may operate there
      - screenshot inspection for overlap, clipping, unreadable text, unreachable actions, and page-level horizontal overflow
  editor_stress_acceptance:
    applies_when: artifact renders editable, generated, document-like, fixed-format, long-form, visual, note, or report content
    requires:
      - long-title and long-body fixtures
      - fixed-surface framing or scroll ownership proof
      - edit/readback or state persistence proof when editing exists
  semantic_output_acceptance:
    applies_when: artifact generates, transforms, recommends, summarizes, analyzes, or composes output
    requires:
      - output-specificity check against central_output_contract
      - repeated-generic-output rejection
      - sample output review that states what the user/operator can do next
  integration_operator_acceptance:
    applies_when: artifact is a plugin, integration, CLI, service, worker, automation, API, or background job
    requires:
      - install/configure/first-action proof
      - error, retry, idempotency, logging, audit, and recovery expectations where relevant
      - explicit live-provider or external-side-effect blockers
  critical_review_pushback:
    applies_when: serious executable packet or user-facing artifact
    phase_id: 99-critical-review-pushback
    phase: 03-phases/critical-review-pushback.md
    pass_threshold: "42/50, no category below 4, no unresolved high-severity finding"
    repair_loop: "up to five flaw -> fix -> proof -> rescore iterations unless externally blocked"

state_and_handoff:
  local_state_dir: .buildprint/
  setup_receipt: .buildprint/setup-receipt.md
  readme_template: README.md
  handover_template: HANDOVER.md

proven_implementation_requirements:
  rule: Replace or specialize this template-level rule during selected extraction. Hard product domains must use proven libraries, SDKs, runtimes, or platform services unless a from-scratch alternative is explicitly justified and proven against the same acceptance criteria. Keep selected packets stack-neutral, but do not let builders casually hand-roll fixed-format export, rich editing, document parsing, drag interactions, chart rendering, provider clients, task orchestration, or migrations.
  detect_from_source:
    - fixed-format export or rendering
    - rich text or inline editing
    - document parsing or ingestion
    - drag/reorder/canvas interaction
    - charts, diagrams, maps, timelines, code rendering, or visual primitives
    - live provider SDKs, OAuth, webhooks, external APIs, or local model runtimes
    - background jobs, export tasks, queues, retries, or long-running work
    - durable persistence, migrations, file/object storage, or sync
  selected_packet_must:
    - name hard domains that are source-derived product requirements
    - require a proven package/runtime/service category for each hard domain
    - keep implementation choices stack-neutral unless the source makes a specific stack part of the product contract
    - allow from-scratch alternatives only with explicit justification and proof equal to the proven tool path
    - record selected package/runtime choices in docs/architecture.md during setup
  common_domains:
    editable_slide_rendering:
      requirement: Use a structured rendering/editing approach that preserves layout, editable content fields, theme/font separation, fixed-surface framing, and persisted readback.
    rich_text_and_inline_editing:
      requirement: Use a proven editor framework or narrowly scoped structured controls; plain textareas are acceptable only for simple fields and must not be claimed as rich editing.
    fixed_format_export:
      requirement: Use a real export library, browser/converter runtime, or dedicated export service; placeholder artifacts and screenshot-only exports are forbidden when editable/fidelity claims are made.
    document_extraction:
      requirement: Use established parsers/extractors for PDF, Office, spreadsheet, text, image/OCR, or source-specific formats as applicable; ingested content must affect the central output.
    drag_reorder_and_canvas_interaction:
      requirement: Use a proven interaction library for complex pointer/drag behavior unless custom code proves keyboard, pointer, focus, persistence, and edge cases.
    charts_diagrams_and_visual_primitives:
      requirement: Use chart/diagram/rendering libraries or structured visual primitives where generated outputs claim those capabilities.
    provider_abstraction:
      requirement: Define a local provider interface and use official SDKs or well-supported clients for live providers; provider-specific auth/model/error handling must not be scattered through UI code.
    background_jobs_and_export_tasks:
      requirement: Use a real task/status model for long-running work; heavier deployments may use queues, but local proof still needs durable task state or honest blockers.
    persistence_and_migrations:
      requirement: Use a database layer with migrations or an explicit schema evolution path; browser-only or memory-only state is forbidden when durability is claimed.
