<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#132d2b" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Viridian Edge — World Alignment Slice</title>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">Viridian Edge</p>
          <h1>A quiet road north</h1>
        </div>
        <p class="hint">Move with arrows or WASD</p>
      </header>
      <section class="game-frame" aria-label="Playable pixel world">
        <div id="game" data-testid="game-canvas"></div>
        <div class="location" aria-live="polite">
          <span>Route Grove</span>
          <small>Morning · Clear</small>
        </div>
      </section>
      <nav class="dpad" aria-label="Touch movement controls">
        <button type="button" data-direction="up" aria-label="Move up">↑</button>
        <button type="button" data-direction="left" aria-label="Move left">←</button>
        <button type="button" data-direction="down" aria-label="Move down">↓</button>
        <button type="button" data-direction="right" aria-label="Move right">→</button>
      </nav>
      <footer>
        <span>Explore the pond, market path, and cedar grove.</span>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
