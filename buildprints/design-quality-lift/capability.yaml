motion_tokens:
  easing:
    - id: 'ease-out'
      usage: enter, exit, appear
      source: animations.dev
    - id: 'ease-in-out'
      usage: on-screen movement, choreography
      source: animations.dev
    - id: 'ease'
      usage: hover, color transitions
      source: animations.dev
  duration_by_direction:
    clean-minimal: { enter: '120ms', exit: '120ms', hover: '80ms' }
    warm-human: { enter: '320ms', exit: '280ms', hover: '200ms' }
    brutalist: { enter: '100ms', exit: '100ms', hover: '0ms' }
    premium-luxury: { enter: '400ms', exit: '360ms', hover: '240ms' }
    wild-creative: { enter: '700ms', exit: '600ms', hover: '320ms' }
  when_not_to_animate:
    - elements seen 100+ times daily (toggles, common buttons)
    - decorative-only motion with no information role
    - color transitions on plain text (use weight change instead)

visual_risk_budget:
  description: Per direction, 1-3 explicit rule breaks allowed to escape generic output.
  clean-minimal: [asymmetric_grid_in_one_section, oversized_single_quote_in_one_hero, mono_accent_bleed_in_one_moment]
  warm-human: [one_hand_drawn_element_per_app, one_personal_microcopy_per_surface, one_unexpected_warm_color_moment]
  brutalist: [one_exposed_grid_moment_per_app, one_unstyled_raw_element, one_brutalist_typography_moment]
  premium-luxury: [one_custom_illustration_per_app, one_signature_transition, one_subtle_texture_moment]
  wild-creative: [asymmetric_grid_throughout, oversized_typography, unusual_color_combinations, scroll_driven_hierarchy_breaks, custom_cursor_morph]

composition:
  provides:
    - direction-locked design quality lift
    - token system
    - component upgrade receipts
    - motion inventory
    - microcopy inventory
    - accessibility audit pass
  conflicts_with:
    - ship-fast-without-visual-receipt
    - "looks don't matter" culture
    - hosts without browser-proof-path
    - hosts without test runner
    - LLM-default-driven UI generation without direction lock
    - serious-b2b-only with no creative latitude

apply:
  inspect:
    - host app current design system and tokens
    - host app component inventory
    - host app state coverage (empty, loading, error, success, offline, blocked)
    - host app motion usage (if any)
    - host app microcopy inventory
    - host app accessibility status
    - host app icon library imports
    - host app typography imports
    - host app build pipeline for bundle size audit
    - host app test runner
  steps:
    - run 00-host-assessment.md to audit current state
    - run 00-assessment-questions.md to lock direction and gather decisions
    - run 01-integration-plan.md to reconcile assessment with plan
    - implement 02-implementation-phases/01-contract-and-config.md (direction lock + tokens)
    - implement 02-implementation-phases/02-core-integration.md (components + states)
    - implement 02-implementation-phases/03-host-wiring.md (motion + microcopy)
    - implement 02-implementation-phases/04-user-operator-surface.md (accessibility + IA)
    - implement 02-implementation-phases/05-verification-and-receipt.md (signature moment + receipt)
    - run verify.md to verify all gates pass
    - write capability-receipt.md with all required outputs
  forbidden:
    - Do not redesign the whole product without direction lock
    - Do not replace existing functionality — only lift visual quality
    - Do not install 3rd-party adapters without user approval
    - Do not proceed without locked direction profile
    - Do not skip banned defaults audit
    - Do not skip before/after screenshots
    - Do not claim success without capability-receipt.md

verify:
  proof_level: sandbox
  commands:
    - npm run build or equivalent
    - npm run test if available
    - lighthouse accessibility audit
    - axe accessibility audit
    - banned defaults regex scan
    - icon library import scan
    - bundle size audit
    - screenshot comparison (before/after)
  runtime_checks:
    - no banned default patterns in built CSS/JS
    - icon library used, no hand-rolled SVGs in primary components
    - prefers-reduced-motion media query present
    - prefers-reduced-transparency media query present
    - lighthouse accessibility score >= 95
    - axe audit passes with 0 critical/serious issues
    - direction profile locked in receipt
    - three dials recorded in receipt
    - signature moment implemented with proof
    - motion tokens match direction defaults
    - microcopy has voice attribution
    - no generic friendly microcopy (Oops/Whoopsie)
    - typography pairing recorded in receipt
    - visual risk budget audit shows 1-3 rule breaks max
  blocked_checks:
    - no direction profile locked blocks implementation
    - banned defaults present block claim
    - hand-rolled SVG icons block component phase
    - missing reduced-motion fallback blocks motion phase
    - missing reduced-transparency fallback blocks visual phase
    - lighthouse score < 95 blocks accessibility claim
    - axe critical/serious issues block accessibility claim
    - missing before/after screenshots block receipt
    - missing signature moment proof blocks direction claim
    - missing motion inventory blocks motion claim
    - missing microcopy inventory blocks microcopy claim

risk:
  level: medium
  reason: Design quality lift touches UI, motion, and microcopy across all user-facing surfaces. Risk of breaking existing accessibility, introducing banned defaults, or overclaiming without receipts. Mitigated by direction lock, banned defaults audit, and visual proof requirements.

failure_modes:
  - direction-less-default — Agent produces generic LLM-default output without locking a direction. Detection: receipt missing direction_profile_locked.
  - banned-default-drift — LLM-default patterns (Fraunces, Inter+slate, AI-purple gradient) reappear. Detection: banned_defaults_audit non-empty.
  - signature-missing — Direction's required signature moment is absent or generic. Detection: signature_moment_proof missing or matches another direction.
  - motion-without-tokens — Raw cubic-bezier or random ms durations instead of named tokens. Detection: motion_inventory missing token IDs.
  - hand-rolled-svg — Inline SVG paths instead of icon library import. Detection: banned_patterns:hand-rolled-svg-icons match.
  - a11y-shortcut — Reduced-motion or reduced-transparency fallback missing. Detection: prefers-reduced-* media query scan.
  - empty-microcopy — Generic friendly microcopy without voice guide. Detection: microcopy_inventory missing voice attribution.
  - bundle-bloat — Multiple icon libraries imported or unused icons in bundle. Detection: import scan + bundle size audit.
  - no-receipt — Claim made without capability-receipt.md. Detection: verify step missing receipt.

execution:
  decision_mode: deferred
  default: self-contained
  rationale: Default path keeps the harness auditable in one place. Adoption of any 3rd-party path requires an adapter layer so existing gates stay authoritative.

proposed_integration_paths:
  default: self-contained
  decision: deferred
  paths:
    - id: taste-skill-adapter
      target_profiles: [brief-and-direction, motion]
      summary: Use taste-skill v2 SKILL as the brief inference + design system map engine.
      adapter_layer: optional
      install: 'npx skills add https://github.com/Leonxlnx/taste-skill --skill design-taste-frontend'
    - id: animations-dev-adapter
      target_profiles: [motion]
      summary: Use animations.dev SKILL.md for motion theory, easing, duration rules.
      adapter_layer: optional
    - id: spline-3d-adapter
      target_profiles: [signature-moment]
      summary: Use Spline for 3D signature moment in warm-human, premium-luxury, wild-creative.
      adapter_layer: required when 3d_role is required/recommended
    - id: gsap-adapter
      target_profiles: [signature-moment, motion]
      summary: Use GSAP for kinetic typography and scroll hijacks when needed.
      adapter_layer: optional
      scope: 'kinetic typography + scroll hijacks only per taste-skill'
    - id: react-three-fiber-adapter
      target_profiles: [signature-moment]
      summary: Use React Three Fiber for custom 3D in code (wild-creative, premium-luxury).
      adapter_layer: required when 3d_role is required/recommended
    - id: phosphor-icons-adapter
      target_profiles: [components]
      summary: Use Phosphor Icons as primary icon family (default for clean-minimal, warm-human, premium-luxury).
      adapter_layer: optional
    - id: hugeicons-adapter
      target_profiles: [components]
      summary: Use Hugeicons (bold) for wild-creative, fill weight for warm-human.
      adapter_layer: optional
    - id: tabler-icons-adapter
      target_profiles: [components]
      summary: Use Tabler Icons (1.5 stroke) for brutalist.
      adapter_layer: optional
    - id: designmd-format-adapter
      target_profiles: [visual-system, components, states]
      summary: Use designmd.ai DESIGN.md format as optional design contract delivery.
      adapter_layer: optional
    - id: hybrid-self-plus-adapter
      target_profiles: [all]
      summary: Keep self-contained, add optional adapter layer per adopted path.
      adapter_layer: required
  guardrails:
    - adopted paths must run behind existing deterministic gates
    - model-judge scores may never override visual proof gates
    - adapters must surface in the receipt (present/absent/version)
    - no adopted path may produce banned defaults
    - 3D adapter is only enabled when direction three_d_role is required or recommended
    - direction profile may not be silently changed by an adapter

receipt:
  required_outputs:
    - direction_profile_locked
    - three_dials_recorded
    - before_after_screenshots
    - lighthouse_audit
    - axe_audit
    - microcopy_inventory
    - motion_inventory
    - icon_library_inventory
    - typography_pairing_recorded
    - signature_moment_proof
    - visual_risk_budget_audit
    - banned_defaults_audit
  proof_levels:
    - none
    - inferred
    - sandbox
    - host-applied
    - production
