schema: agent-buildprint/capability.v0
name: design-quality-lift
type: capability
title: Design Quality Lift
description: Grafts a holistic design quality lift onto an existing app — visual system, components, states, motion, microcopy, accessibility, and information architecture — with per-direction signature moments, banned defaults, and before/after receipts at a named quality bar.
capability: design.quality-lift
execution_profile: strict
claim_status: unproven
status: draft
canonical_start: BUILDPRINT.md

host_frameworks:
  - nextjs
  - react
  - vue
  - svelte
  - astro
  - tailwindcss
  - shadcn
  - angular
  - vanilla-js
  - any-web-app-with-css

host_detection:
  package_files:
    - package.json
    - pnpm-lock.yaml
    - yarn.lock
    - package-lock.json
  route_signals:
    - pages/
    - app/
    - src/
    - public/
    - src/app
    - src/pages
  auth_signals:
    - auth/ directory
    - session cookie or token handling
    - login/signup routes
  database_signals:
    - any database client import
    - ORM config
    - schema files

requires:
  env:
    - node for npm run scripts
    - browser for lighthouse and axe audits
    - optional icon library package
  existing_capabilities:
    - browser-proof-harness or any screenshot tooling
    - test runner (jest, vitest, playwright, etc.)
  human_decisions:
    - which direction profile to lock (clean-minimal, warm-human, brutalist, premium-luxury, wild-creative, or custom)
    - whether to adopt any 3rd-party adapter paths (taste-skill, animations.dev, Spline, GSAP, etc.)
    - which existing design system tokens to keep vs replace
    - whether motion is appropriate for this product
    - visual risk budget (1-3 rule breaks)
    - proof level target (sandbox, host-applied, or production)

touches:
  - css tokens and design system variables
  - component source files (buttons, cards, inputs, modals)
  - empty/loading/error/success/offline/blocked states
  - typography imports and font loading
  - icon library imports and usage
  - motion/animation CSS or JS
  - microcopy strings
  - accessibility attributes (aria, focus, keyboard)
  - information architecture (nav, hierarchy, density)
  - signature moment implementation
  - receipt artifacts

contract:
  profiles:
    - brief-and-direction
    - visual-system
    - components
    - states
    - motion
    - microcopy
    - accessibility
    - information-architecture
    - signature-moment
    - receipts

read_order:
  - BUILDPRINT.md
  - capability.yaml
  - compatibility.md
  - 00-host-assessment.md
  - 00-assessment-questions.md
  - 01-integration-plan.md
  - apply.md
  - 02-implementation-phases/01-contract-and-config.md
  - 02-implementation-phases/02-core-integration.md
  - 02-implementation-phases/03-host-wiring.md
  - 02-implementation-phases/04-user-operator-surface.md
  - 02-implementation-phases/05-verification-and-receipt.md
  - verify.md
  - README.md
  - examples/
  - references/research-basis.md

profiles:
  - id: brief-and-direction
    required: true
    summary: Lock the design direction before any code, with banned defaults enforced.
  - id: visual-system
    required: true
    summary: Token system (color, type, space, radius, elevation, motion) used in components.
  - id: components
    required: true
    summary: Direction-specific component library, no hand-rolled SVG icons.
  - id: states
    required: true
    summary: Empty, loading, error, success, offline, and blocked states for every interactive surface.
  - id: motion
    required: true
    summary: Easing, duration, and choreography tokens, with reduced-motion fallback.
  - id: microcopy
    required: true
    summary: Voice guide, error messages, empty states, onboarding with opinions.
  - id: accessibility
    required: true
    summary: WCAG 2.2 AA minimum, keyboard navigation, focus visible, screen reader labels.
  - id: information-architecture
    required: false
    summary: Nav, hierarchy, density decisions recorded and reviewed.
  - id: signature-moment
    required: true
    summary: Per-direction required creative moment with visual risk budget.
  - id: receipts
    required: true
    summary: Before/after screenshots, lighthouse, axe, microcopy and motion inventories.

direction_profiles:
  - id: clean-minimal
    references: [Linear, Vercel, Stripe, Notion (calm mode)]
    mapped_to_skill: taste-skill/minimalist-skill
    signature_moment: typografischer Hero-Moment (Display Size + Custom Pairing + unerwarteter Hierarchie-Bruch)
    three_d_role: forbidden
    icon_system: phosphor
  - id: warm-human
    references: [Notion, Cron, Linear (warm side), Headspace]
    mapped_to_skill: taste-skill/soft-skill
    signature_moment: menschen-gemachter Moment (hand-drawn illustration, personal microcopy, analog texture)
    three_d_role: optional
    icon_system: phosphor-duotone
  - id: brutalist
    references: [Vercel docs (brutalist), Bauhaus, Swiss typography, indie brutalist]
    mapped_to_skill: taste-skill/brutalist-skill
    signature_moment: raw strukturelle Aussage (exposed grid, brutalist grid moment, system reveal)
    three_d_role: forbidden
    icon_system: tabler
  - id: premium-luxury
    references: [Apple, Stripe (premium), Linear (premium), Arc browser]
    mapped_to_skill: taste-skill/high-end-visual-design
    signature_moment: feine Detail Aussage (custom illustration, signature transition, material moment)
    three_d_role: recommended
    icon_system: phosphor-thin
  - id: wild-creative
    references: [Nothing, Teenage Engineering, Apple (bold), awwwards.com, Arc (creative)]
    mapped_to_skill: taste-skill/image-to-code-skill + taste-skill/gpt-tasteskill
    signature_moment: unerwartete Interaktion (custom cursor, scroll-choreografie, signature transition)
    three_d_role: required
    icon_system: hugeicons-bold

banned_defaults:
  description: Hard-fail patterns when present without explicit user opt-in and rationale.
  patterns:
    - id: llm-default-serif-display
      pattern: 'font-family[^;}]*(Fraunces|Instrument_Serif|Playfair Display|Cormorant Garamond)[^;}]*'
      rationale: AI tell, lazy default for "creative" briefs.
    - id: llm-default-inter-slate
      pattern: 'bg-slate-900[^\n]*text-white|font-family[^;}]*Inter[^;}]*slate'
      rationale: Most-tested AI tell in production rounds.
    - id: ai-purple-gradient
      pattern: 'linear-gradient[^;}]*(purple|violet|fuchsia|indigo)[^;}]*'
      rationale: Anti-creative gradient crutch.
    - id: centered-hero-dark-mesh
      pattern: 'radial-gradient[^;}]*mesh|mesh-gradient'
      rationale: AI-default hero cliche.
    - id: three-equal-feature-cards
      pattern: 'grid-cols-3[^\n]*gap-4[^\n]*\n[^\n]*\n[^\n]*\n[^\n]*\n[^\n]*\n[^\n]*\n[^\n]*'
      rationale: Cookie-cutter layout.
    - id: hand-rolled-svg-icons
      pattern: '<svg[^>]*>\s*<path[^>]*d="M[0-9.]{1,4} '
      rationale: Use a library (Phosphor, Hugeicons, Radix, Tabler).
    - id: generic-friendly-microcopy
      pattern: '(Oops|Whoopsie|Whoops)[!.]?$'
      rationale: Lazy microcopy, no voice.
    - id: infinite-loop-animations
      pattern: 'animation:[^;}]*infinite|animate-spin[^a-z]'
      rationale: Distracts from content.
    - id: random-cubic-bezier
      pattern: 'cubic-bezier\([^0-9.]*[2-9]'
      rationale: Use named easing tokens.

required_patterns:
  description: Hard-required patterns per direction.
  universal:
    - prefers_reduced_motion_fallback
    - prefers_reduced_transparency_fallback
    - keyboard_navigation_for_interactive
    - focus_visible_everywhere
    - lighthouse_accessibility_ge_95
    - axe_audit_pass
    - icon_library_used_no_hand_rolled_svg
    - direction_profile_locked_in_receipt
    - three_dials_recorded_in_receipt
  per_direction:
    clean-minimal: [eight_pt_baseline_grid, mono_accent_le_2_surfaces, max_two_type_weights, motion_le_120ms, sans_display_first]
    warm-human: [radius_ge_8px, warm_accent_not_blue, soft_shadows_le_2_levels, conversational_microcopy, hand_drawn_or_custom_empty_state]
    brutalist: [border_radius_zero_or_le_4px, pure_black_white_plus_one_accent, mono_font_visible, motion_le_100ms, raw_structural_elements_visible]
    premium-luxury: [custom_illustration_per_app, signature_transition_with_custom_easing, type_families_le_3, deep_neutrals_plus_sophisticated_accent, soft_shadows_le_2]
    wild-creative: [distinctive_typography_pairing, hero_motion_gt_600ms, signature_color_moment, one_3d_moment, one_unexpected_interaction]

