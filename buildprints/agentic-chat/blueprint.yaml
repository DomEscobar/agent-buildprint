schema_version: mapper-os/executable-blueprint/v3
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
claim_status: product_build_required
qualification_label: local_real_model_build_requires_review

deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp
  claim_ceiling: a user-selected real provider streaming real tokens is the proven outcome floor; paid-provider and public hosting claims require configured credentials plus runtime proof; the model-driven tool/skill/MCP/memory action loop (agentic_chat) and parallel subagent swarm dispatching (agentic_swarm) require typed runtime paths, approval gates, per-run traces, and product-loop proof, or explicit blockers, before their claims may be made.

read_order:
  - BUILDPRINT.md
  - references/runtime-techniques-basis.md
  - 00-questions.md
  - 01-project-setup.md
  - 02-ui-identity.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - README.md
  - HANDOVER.md

packet_shape:
  style: phase_driven_comprehensive_with_agentic_swarm
  principle: YAML routes; markdown teaches and builds; execution loops are explicit contracts, not optional prose.
  required_files:
    - BUILDPRINT.md
    - references/runtime-techniques-basis.md
    - 00-questions.md
    - 01-project-setup.md
    - 02-ui-identity.md
    - blueprint.yaml
    - 03-phases/phase-index.yaml
    - 03-phases/phase-flow.md
    - README.md
    - HANDOVER.md
  forbidden_shapes:
    - slices/
    - gates/
    - 02-architecture.md
    - 03-ux-contract.md
    - 04-handover.md
    - 04-review.md
    - 05-handover.md
    - generated/agent-prompt.md
    - generated/codex-handoff.md

setup_architecture_contract:
  rule: Project setup must generate a product-specific architecture packet and project structure before identity or implementation starts. Architecture is a start model for coding agents, not a post-build explanation.
  required_artifacts:
    - architecture/system-architecture.md
    - architecture/agent-runtime-loop.md
    - architecture/chat-turn-sequence.md
    - architecture/state-and-memory-model.md
    - architecture/failure-recovery-flow.md
    - PROJECT_STRUCTURE.md
    - ARCHITECTURE_STRUCTURE_TRACE.md
  diagram_requirements:
    - every architecture file contains Mermaid, a component legend, and an Implementation Mapping section
    - every edge is labeled with the data, event, command, policy decision, approval, observation, or error that flows across it
    - component names describe Agentic Chat runtime responsibilities, not generic layers
    - diagrams cover UI/API/runtime, provider adapter, persistence, telemetry/trace, agent loop, memory/blocked states, failure recovery, and claim ceilings
  forbidden_lazy_shapes:
    - Frontend -> Backend -> Database without product-specific responsibilities
    - generic boxes such as API, Auth, Agent, Service, Utils, or DB without ownership and behavior
    - unlabeled arrows
    - project trees dominated by components, utils, services, api, pages, lib, helpers, or misc without narrowed product/runtime responsibility
    - diagrams without component-to-code mapping
    - file trees without test/eval/proof mapping
  project_structure_rule: PROJECT_STRUCTURE.md must organize files by Agentic Chat product/runtime responsibilities and state purpose, ownership, exclusions, architecture mapping, and tests/evals for every top-level source area.
  traceability_rule: ARCHITECTURE_STRUCTURE_TRACE.md must prove every diagram component maps to planned files/modules and proof, every important file maps back to architecture, and every runtime responsibility has test/eval/command proof or an explicit blocker.
  score_gate:
    minimum_to_continue: 4
    maximum: 5
    rubric:
      0: generic boxes or generic file tree; useless
      1: technical layers only; no Agentic Chat responsibilities
      2: some product-specific names but weak flow or ownership
      3: concrete components, labeled flows, and plausible structure
      4: component-to-code mapping, state ownership, and proof mapping
      5: score 4 plus failure paths, claim ceilings, and eval/test mapping
    failure_route: return_to_setup

phase_contract:
  required_headings:
    - How to implement this phase
    - Building objective
    - DO NOT
    - Minimum proof before moving on
    - Handoff note
  rule: Each phase must be an executable engineering brief with concrete user/operator loop, runtime contracts, persisted state, surface behavior, failure matrix, proof artifacts, and claim ceiling. Do not decompose phase guidance into tiny schema sections or slice YAML.
  forbidden_shapes:
    - slices/
    - gates/
    - 02-architecture.md
    - 03-ux-contract.md
    - 04-handover.md
    - 04-review.md
    - 05-handover.md
    - generated/agent-prompt.md
    - generated/codex-handoff.md

execution_model:
  mode: agentic_loop
  rule: Buildprints are not linear phase recipes. A coding agent must iterate through builder, product, and proof loops until the product contract passes, an iteration budget is exhausted, or an external blocker is recorded.
  iteration_budget:
    minimum_repair_iterations: 1
    maximum_repair_iterations: 5
    stop_only_on:
      - contract_passed_with_evidence
      - external_blocker_recorded
      - iteration_budget_exhausted_with_failure
  builder_loop:
    name: Buildprint Builder Loop
    steps:
      - observe current repo, app, screenshots, logs, tests, and handoff state
      - interpret gaps against central_output_contract, capability_maturity, local docs/ui-identity.md, and docs/DESIGN.md
      - plan the smallest real repair that advances the product contract
      - act by changing implementation, tests, docs, fixtures, or proof artifacts
      - inspect runtime, browser, API, logs, persistence, and generated evidence
      - critique the result against predicted failure modes and nearest bad silhouettes
      - repair one concrete weakness before advancing unless none is found
      - verify with commands, browser/API transcripts, screenshots, readback, and claim checks
      - decide pass, continue, or fail honestly
  product_loop:
    name: Agentic Chat Product Loop
    required_for_agentic_chat_claim:
      - goal intake in the chat composer or thread context
      - plan or next-step state visible in product language with stale-plan replan when needed
      - stateful harness boundary separating agent brain from UI/session with caller-owned transcript and event stream
      - steering or follow-up queue that can inject user input during an active run without corrupting state
      - cancellation with dangling tool-call repair before the next model request
      - model-driven action selection across model, tool, skill, MCP, and memory paths (not user-typed slash commands or keyword pattern-matching)
      - ActionSelectionEvidence proving provider-native tool/function calling or a normalized model action record, not slash commands, keywords, regex, or button-only routing
      - at least one tool, skill, or MCP server implemented or wired by the building agent during this build (not an assumed pre-existing/external capability) as the live proof target
      - SelfImplementedActionEvidence citing the authored file/module and the commit/change that added it
      - the action-selection proof trace was captured against a live, real-running provider connection (local or paid, per 00-questions), never the deterministic test double
      - context packing or compaction before model calls with trust-zone labels and budget check
      - prompt-injection action firewall screening proposed actions against original user intent when untrusted context influenced the model
      - scoped capability grants per action with expiry; no unscoped global tool access
      - policy/approval gate before side-effecting actions with reject/edit/resume branches
      - execution trace attached to the relevant message or turn
      - observation/result ingestion fed back to the model for the next step
      - ObservationReingestionEvidence proving the action result influenced the next model step and final synthesis
      - tool error recovery as typed observations, not silent retries
      - loop detection or no-progress circuit breaker within the bounded step/retry budget
      - runtime budget policy for tokens, time, tool calls, steps, and cost with warn/hard-stop UI states
      - idempotency keys on write/external side effects where duplicate execution would be harmful
      - verifier or goal done-check before final synthesis, or honest typed blocker when verification fails
      - run receipt export and append-only session event log supporting replay/readback
      - critique/retry/recovery path for failed actions within a bounded budget
      - resumable state after reload or restart
      - AgenticRestartEvidence for agent_run, ordered agent_step, action_request, policy_result, approval_record when applicable, action_result, agent_trace, session events, and run receipt
      - final synthesis tied to the original user goal with provenance links to observations
    required_for_agentic_swarm_claim:
      - supervisor decomposes a goal into typed, parallelizable subtasks
      - delegation ledger and max handoff depth or no-progress breaker on the swarm run
      - parallel subagent dispatch with bounded concurrency and a work queue
      - SwarmConcurrencyEvidence proving overlapping subagent timestamps under a real concurrency primitive
      - per-subagent run id, isolated context, scoped tool/MCP access, and independent trace
      - WorkerIsolationEvidence proving workers do not inherit unscoped global context or tool access
      - fan-in aggregation that the supervisor synthesizes into one answer tied to the goal
      - verifier or partial-failure honesty on fan-in synthesis; no hidden worker failures
      - approval gate before spawning a swarm that performs side effects
      - per-subagent and whole-swarm cancellation
      - bounded per-subagent retry and partial-failure handling (some workers fail, swarm still synthesizes honestly)
      - a frozen decomposition plan artifact (SwarmPlanArtifact) enabling restart/resume to replay the exact task graph without re-invoking the supervisor
      - resumable swarm run, subagent records, and aggregation after restart
      - per-worker and swarm-level run receipts
      - SwarmRestartEvidence for swarm_run, subtask_spec, subagent_run, per-worker agent traces, and aggregation_record
  proof_loop:
    name: Evidence Repair Loop
    steps:
      - score the current artifact against central output, maturity, UI, runtime, and claim gates
      - reject stale, generic, prose-only, screenshot-missing, or fake-success evidence
      - route each failure to setup, UI identity, implementation phase, or critical review
      - patch the smallest real weakness
      - rerun the affected proof
      - rescore until pass, blocker, or iteration budget exhaustion
  stop_conditions:
    pass: every active maturity gate has fresh evidence, .buildprint/claim-gates.json computes the same highest honest claim as HANDOVER.md, no hard fail remains, and HANDOVER.md claim ceiling matches proof
    blocked: exact missing credential, runtime, decision, permission, or external dependency is recorded
    fail: loop budget exhausted, product remains generic, or Buildprint run does not beat a normal plan-mode baseline on the benchmark

capability_maturity:
  current_floor: streaming_chat_core
  full_claim: agentic_swarm
  rule: Do not call the artifact agentic until the model-driven action loop is proven, and do not call it a swarm until parallel subagent dispatch with supervisor synthesis is proven. The streaming chat core is a necessary foundation, not the final product; each level is a strictly higher claim with its own evidence.
  levels:
    streaming_chat_core:
      claim: real-model streaming chat foundation
      required:
        - real provider token streaming
        - provider routing and blocked states
        - durable sessions/messages/events/routes/telemetry
        - cancellation/retry/error recovery
        - polished chat-native UI
    agentic_chat:
      claim: model-driven single-agent tool loop with production runtime layers
      required:
        - stateful harness with steering queue, cancellation, and dangling tool-call repair
        - planning/next-step loop with stale-plan replan
        - model-driven action selection via provider tool/function calling, not slash commands or keyword pattern-matching
        - at least one tool/skill/MCP server implemented or wired by the building agent itself, exercised live over a real-running provider connection (not the deterministic test double)
        - context packing with trust zones before model calls
        - prompt-injection action firewall and scoped capability grants
        - tool/skill execution policy with typed results and tool error recovery
        - MCP adapter posture and allowlist boundary when enabled
        - memory/compaction read/write policy with audit trail
        - runtime budget policy and loop detection circuit breaker
        - single run-level budget invariant covering model, tool, verifier/consensus, and subagent/delegation spend
        - idempotency keys on write/external side effects where needed
        - verifier or goal done-check before final synthesis
        - run receipt and append-only session event log
        - subagent/delegation records when used
        - approval gates for side effects with reject/edit/resume
        - observation re-ingestion, critique, bounded retry, and resumable trace
        - final synthesis tied to the original goal with provenance links
        - .buildprint/claim-gates.json records agentic_chat.status as pass with cited evidence
    agentic_swarm:
      claim: parallel multi-agent swarm dispatching
      required:
        - supervisor goal decomposition into typed subtasks
        - parallel subagent spawning with bounded concurrency and queue
        - isolated per-subagent context, scoped tool/MCP access, and independent trace
        - fan-out dispatch and fan-in supervisor synthesis tied to the goal
        - approval gate before side-effecting swarms
        - per-subagent and whole-swarm cancellation
        - bounded retry and honest partial-failure synthesis
        - a frozen decomposition plan artifact enabling restart/resume replay without re-invoking the supervisor
        - resumable swarm run, subagent records, and aggregation after restart
        - benchmark evidence that the swarm build beats a single-agent and normal plan-mode baseline on completeness, latency-aware orchestration, UI, runtime behavior, and proof quality
        - .buildprint/claim-gates.json records agentic_swarm.status as pass with cited evidence

agent_contract:
  role: Senior Product Engineer
  rule: Build the agentic chat runtime honestly. Streaming, provider, tool, MCP, memory, subagent, swarm, telemetry, WebUI, and safety claims require direct proof or explicit blockers. A streaming-only product may pass the foundation floor but must not be marketed as agentic; a single-agent loop must not be marketed as a swarm.

harness:
  provider: agents
  profiles:
    - webapp
    - backend
    - agentic
  selection_rule: Use only profiles that match this artifact. Do not expand to full unless broad coverage is explicitly worth the extra context.

runtime_techniques:
  research_basis: references/runtime-techniques-basis.md
  external_catalog: https://github.com/DomEscobar/agentic-runtime-techniques
  primary_use_cases:
    - simple_tool_assistant
    - multi_step_task_agent
    - risky_action_agent
    - durable_background_agent
    - multi_agent_system
  composition_recipe:
    name: Reliable General Agentic Chat
    stack:
      - Intent / context router
      - Stateful Harness Around Pure Agent Loop
      - ReAct tool loop via provider tool/function calling
      - Plan-and-execute next-step state
      - Tool error recovery
      - Loop detection circuit breaker
      - Runtime budget policy engine
      - Context packing before model calls
      - Prompt-injection action firewall
      - Context trust zones
      - Capability / least-privilege grants
      - HITL approval gate
      - Verifier / goal done-check
      - Run receipt and append-only session event log
      - Supervisor + bounded worker pool when claiming agentic_swarm
  required_layers:
    harness_and_durability:
      - stateful harness separating agent brain from UI/session/persistence
      - caller-owned transcript and provider-neutral event stream
      - steering and follow-up queue during active runs
      - cancellation token and dangling tool-call repair
      - append-only session event log with replay-derived active state
      - agent run status events decoupled from one HTTP/stream lifetime
    safety_and_governance:
      - original user intent record for action screening
      - context trust zones on packed context
      - prompt-injection action firewall before side-effecting execution
      - scoped capability grants per action/subtask with expiry
      - HITL approval with reject/edit/resume branches
    reliability:
      - loop detection and no-progress circuit breaker
      - runtime budget policy for tokens, time, tool calls, steps, and cost
      - single run-level budget invariant covering model, tool, verifier/consensus, and subagent/delegation spend — no separate bypassable sub-budget
      - tool error-to-observation recovery with typed taxonomy
      - idempotency keys on write/external side effects
      - stale-plan detection and replan trigger
    observability:
      - run receipt export with redaction policy
      - provenance links from synthesis and claims to tool/observation ids
    correctness:
      - verifier or goal loop before final synthesis
      - typed blocker when done cannot be verified
  optional_seams:
    - model cascading / tiered routing
    - semantic or prompt caching
    - A2A remote agent protocol
    - test-time compute search loops
    - saga / compensating transactions beyond idempotency keys
    - offline regression eval harness integration
  anti_patterns:
    - keyword, regex, or slash-command action routing
    - prompt-only agentic behavior without harness, budget, or receipt
    - flat transcript as the only durable state
    - self-certifying completion without verifier or typed blocker
    - sequential subagents relabeled as parallel

central_output_contract:
  rule: The central output must be specific to Agentic Chat, not a generic shell with renamed labels. At full maturity it is a model-driven multi-agent swarm that conducts real work inside a chat-native surface.
  central_output: A chat-native agent that streams real model tokens, autonomously selects and runs allowlisted tools/MCP/memory actions behind approval gates, and at full maturity dispatches a parallel subagent swarm whose results the supervisor synthesizes into one answer — all durably traced and inspectable.
  output_primitives:
    - session and message records
    - append-only session event log and replay-derived active state
    - incremental streaming turn events
    - provider route and credential posture
    - normalized provider usage telemetry
    - agent harness event stream with steering queue and cancellation
    - runtime budget consumption and loop-breaker events
    - model-selected action requests with policy/approval records and typed tool/MCP/memory results
    - context trust zones and capability grant records
    - agent run trace with plan, steps, observations, critique, verifier result, and final synthesis
    - run receipt export with provenance links and redaction policy
    - swarm run with supervisor decomposition, delegation ledger, per-subagent runs, isolated traces, and fan-in aggregation
    - WebUI/API chat surface state including inline action, approval, budget, and swarm-progress affordances
  quality_signals:
    - real model tokens stream before completion
    - unknown and unavailable providers are actionable, not silently substituted
    - the model (not a keyword matcher) decides when a tool, MCP, memory, or subagent action is needed
    - side-effecting actions block on an inline approval gate and persist an audit record
    - untrusted context cannot silently escalate tool authority; actions are screened against original intent
    - context is packed with trust zones and budget checks before each model call
    - runs respect token/time/tool/step budgets with visible warn and hard-stop states
    - loop detection stops no-progress wandering instead of infinite retry
    - observations feed back into the model so the next step is informed, not scripted
    - final synthesis passes a verifier or surfaces an honest blocked state
    - a swarm decomposes the goal, runs subagents in parallel, and synthesizes a goal-tied answer with honest partial-failure handling
    - messages, session events, agent runs, swarm runs, run receipts, and traces survive readback after restart
    - normalized failures retry within a bounded policy or block honestly
    - UI shows empty, streaming, blocked, error, approval, budget, running-subagent, and success states without log parsing
    - agentic claims show plan/action/observation/critique/verifier/retry state in the product loop, not only a chat transcript
  unacceptable_generic_substitutes:
    - static chat mockup
    - deterministic echo presented as a real product turn
    - raw provider JSON as the main surface
    - in-memory-only state claimed as durable
    - silent fallback on unknown providers
    - generic dashboard replacing the chat surface
    - user-typed slash commands or keyword/regex intent pattern-matching presented as model-driven action selection
    - fabricated, sequential, or fake-parallel subagent work presented as a real swarm
    - tool/MCP/memory/subagent capabilities advertised as working while permanently blocked or stubbed
  reviewer_acceptance_questions:
    - Can the user send a turn and see real model tokens stream incrementally?
    - Can the operator inspect which provider/model/route and usage path was used?
    - Can blocked or failed providers recover safely within the retry policy?
    - Does the model itself decide to call a tool/MCP/memory action from natural language, without the user typing a command?
    - Does every side-effecting action pass through an inline approval gate and leave an audit record?
    - Can an agentic_chat claim prove goal intake, action selection, tool/memory/delegation policy, observation, critique, retry, and resumable state?
    - Does a goal that needs parallel work spawn real concurrent subagents whose results the supervisor synthesizes into one goal-tied answer?
    - Do agent runs and swarm runs survive restart and remain inspectable?
    - Which paid-provider, hosting, agentic, or swarm claims remain blocked?
  claim_gates:
    - implementation cannot start until setup architecture and project structure artifacts pass the architecture score gate or record an exact blocker
    - real provider success requires a real streaming token trace, not the test double
    - paid provider success requires a configured key and response trace
    - durability requires persistence readback after restart or blocker
    - public hosting requires auth, abuse, and secrets proof
    - agentic_chat requires a model-driven action selection trace (provider tool/function call) plus an approval-gated, audited tool/MCP/memory execution, not a slash-command demo
    - agentic_chat requires at least one tool/skill/MCP server implemented or wired by the building agent itself, proven live over a real-running provider connection, not the deterministic test double and not an assumed pre-existing capability
    - agentic_swarm requires a real parallel subagent run trace with isolated per-worker context and a supervisor fan-in synthesis, not sequential or fabricated workers
    - if only streaming_chat_core passes, the handoff must say agentic_chat and agentic_swarm remain unqualified
  minimum_standard: A user-selected real provider streams chat tokens incrementally through the provider interface; the turn is persisted, inspectable through route/usage/trace, and survives readback. The deterministic provider exists only as a test fixture, never as the delivered outcome. This is the streaming core floor, not an agentic claim. To claim agentic_chat, the model autonomously selects an allowlisted action, the side effect is approval-gated and audited, and the observation re-enters the loop. To claim agentic_swarm, a supervisor dispatches real parallel subagents and synthesizes their fan-in results into one goal-tied answer with honest partial-failure handling.

typed_quality_gates:
  rule: Select only the gates that match the artifact type; do not copy every possible gate into every packet.
  architecture_structure_readiness:
    applies_when: project setup creates a new implementation project or materially changes architecture
    requires:
      - Mermaid architecture packet with product-specific component names
      - required edge labels
      - component-to-code mapping
      - responsibility-based PROJECT_STRUCTURE.md
      - ARCHITECTURE_STRUCTURE_TRACE.md proving component/file/proof traceability
      - anti-lazy architecture score 4 or 5, or exact blocker and lowered claim ceiling
  ui_decision_precision:
    applies_when: artifact has human-facing UI, reports, generated outputs, visual workflows, forms, or operator surfaces
    requires:
      - explicit style direction and rejected adjacent styles
      - exact color tokens and status semantics
      - typography scale and usage
      - desktop/mobile layout model when responsive use is in scope
      - component and state language before UI implementation
  visual_viewport_acceptance:
    applies_when: artifact has responsive or browser/app UI
    requires:
      - desktop proof for the primary workflow
      - mobile or narrow-viewport proof when users may operate there
      - screenshot inspection for overlap, clipping, unreadable text, unreachable actions, and page-level horizontal overflow
  editor_stress_acceptance:
    applies_when: artifact renders editable, generated, document-like, fixed-format, long-form, visual, note, or report content
    requires:
      - long-title and long-body fixtures
      - fixed-surface framing or scroll ownership proof
      - edit/readback or state persistence proof when editing exists
  semantic_output_acceptance:
    applies_when: artifact generates, transforms, recommends, summarizes, analyzes, or composes output
    requires:
      - output-specificity check against central_output_contract
      - repeated-generic-output rejection
      - sample output review that states what the user/operator can do next
  integration_operator_acceptance:
    applies_when: artifact is a plugin, integration, CLI, service, worker, automation, API, or background job
    requires:
      - install/configure/first-action proof
      - error, retry, idempotency, logging, audit, and recovery expectations where relevant
      - explicit live-provider or external-side-effect blockers
  critical_review_pushback:
    applies_when: serious executable packet or user-facing artifact
    phase_id: 99-critical-review-pushback
    phase: 03-phases/critical-review-pushback.md
    pass_threshold: "50/60, every category 4 or 5, no unresolved high-severity finding"
    repair_loop: "up to five flaw -> fix -> proof -> rescore iterations unless externally blocked"

state_and_handoff:
  local_state_dir: .buildprint/
  setup_receipt: .buildprint/setup-receipt.md
  readme_template: README.md
  handover_template: HANDOVER.md

proven_implementation_requirements:
  rule: Use proven libraries, SDKs, runtimes, or platform services for hard product domains unless a from-scratch alternative is explicitly justified and proven against the same acceptance criteria.
  detect_from_source:
    - fixed-format export or rendering
    - rich text or inline editing
    - document parsing or ingestion
    - drag/reorder/canvas interaction
    - charts, diagrams, maps, timelines, code rendering, or visual primitives
    - live provider SDKs, OAuth, webhooks, external APIs, or local model runtimes
    - provider tool/function calling, structured-output action selection, or agent-orchestration control flow
    - multi-agent / subagent orchestration, concurrency pools, work queues, fan-out/fan-in, or supervisor synthesis
    - frontend UI runtime, stateful screen composition, component/state styling, responsive viewport proof, or design token enforcement
    - background jobs, export tasks, queues, retries, or long-running work
    - durable persistence, migrations, file/object storage, or sync
  selected_packet_must:
    - name hard domains that are source-derived product requirements
    - require a proven package/runtime/service category for each hard domain
    - keep implementation choices stack-neutral unless the source makes a specific stack part of the product contract
    - allow from-scratch alternatives only with explicit justification and proof equal to the proven tool path
    - record selected package/runtime choices in docs/architecture.md during setup
  stack_selection:
    note: The stack is stack-neutral and chosen by the user via 00-questions (provider/model, frontend/backend framework, persistence), then recorded in docs/architecture.md. Suggestions below are non-binding starting points, not mandates. The depth this packet enforces is stack-independent behavior (real-model floor, error taxonomy, bounded retry, cancellation, migration path, model-driven action selection, approval-gated tool/MCP/memory execution, and parallel supervisor/worker swarm orchestration with fan-in synthesis), not a fixed toolset. A provider with native tool/function calling (or a structured-output equivalent) is required for the agentic_chat and agentic_swarm claims.
    provider_suggestions: local Ollama (free, no key) or any official/well-supported client (OpenAI, Anthropic, OpenRouter, Bedrock-compatible)
    transport_suggestion: any incrementally readable transport such as SSE or WebSocket
    persistence_suggestion: any durable store with a migration path such as SQLite
  product_domains:
    provider_abstraction:
      requirement: Use a local ChatProvider interface with a deterministic test double and official/well-supported clients for the user-selected real provider(s). The interface is required; the specific client/SDK is the user's choice.
    streaming_runtime:
      requirement: Implement incremental streaming over a transport selected in setup (SSE or equivalent) with trace, checkpoint, AbortSignal-style cancellation, timeout/error behavior, a bounded retry/backoff policy, and normalized usage events. Buffered-after-completion responses do not qualify.
    agentic_action_loop:
      requirement: Implement model-driven action selection using the provider's native tool/function-calling interface (or an equivalent structured-output contract). Wrap the loop in a stateful harness that separates the agent brain from UI/session/persistence, with caller-owned transcript, provider-neutral events, steering/follow-up queue, cancellation, and dangling tool-call repair. Each action runs through context packing with trust zones, prompt-injection action screening, scoped capability grants, typed policy → approval → execution → observation, tool error recovery, loop detection, runtime budget policy, idempotency keys on write/external effects, verifier/goal done-check, run receipt emission, and append-only session events. Use a proven agent-orchestration approach (provider tool-calling loop, or a library such as the Vercel AI SDK, LangGraph, or an explicit typed state machine); do not hand-roll fragile regex intent parsing.
    tools_skills_mcp:
      requirement: Tools, skills, and MCP servers run through one allowlist-gated policy path with typed inputs/outputs, audit records, inline approval/block UI attached to the message, and no execution from implicit model text. External MCP/browser/file execution stays blocked until allowlist, credentials, side-effect class, timeout/error handling, and proof exist. The building agent must implement or wire at least one real tool, skill, or MCP server itself during phase 04 as the live proof target — assuming a pre-existing/external capability the agent did not author or configure does not satisfy this requirement. That action must be exercised through a live, real-running provider connection (local model runtime or paid provider actually invoked), never the deterministic test double.
    memory_and_compaction:
      requirement: Scoped memory read/write decisions (auto-write/ask/skip/block) and compaction summaries that affect or explain a real turn, summarized in product language (no raw vector/store dumps), with privacy/retention posture and audit trail.
    swarm_orchestration:
      requirement: Implement a supervisor/worker swarm with goal decomposition, bounded-concurrency parallel subagent dispatch (a real concurrency primitive such as a worker pool or task queue, not sequential calls labeled parallel), isolated per-subagent context and scoped tool/MCP access, per-subagent and whole-swarm cancellation, bounded per-subagent retry, honest partial-failure synthesis, and fan-in aggregation the supervisor turns into one goal-tied answer. Persist the swarm run, subagent runs, and steps with a migration path; runs must be resumable and inspectable after restart.
    persistence_and_memory:
      requirement: Persist sessions, messages, traces, provider routes, telemetry, agent runs/steps, action/approval/audit records, memory entries, swarm runs, and subagent runs/steps in the user-selected durable store with a migration path.
    frontend_ui_runtime:
      requirement: Use a proven frontend runtime for stateful chat UI composition; default to React + Vite + TypeScript unless an existing host framework is already proven.
    component_state_styling:
      requirement: Use a proven styling/design-system path for tokens, responsive states, and component variants; default to Tailwind CSS v4 + tokenized CSS variables unless an existing design system is already proven.
    responsive_viewport_proof:
      requirement: Prove desktop/tablet/mobile/narrow states with screenshots and viewport checks tied to docs/DESIGN.md and .buildprint/ui-evidence.md.
