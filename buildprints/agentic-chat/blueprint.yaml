schema_version: mapper-os/executable-blueprint/v3
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
claim_status: product_build_required
qualification_label: local_real_model_build_requires_review

deployment_posture:
  current: trusted_local
  allowed_values:
    - trusted_local
    - private_authenticated
    - public_webapp
  claim_ceiling: a user-selected real provider streaming real tokens is the proven outcome floor; paid-provider and public hosting claims require configured credentials plus runtime proof; tools/skills, MCP, memory/compaction, and subagents are deferred to EXTENSIONS.md and are out of 1.0 scope.

read_order:
  - BUILDPRINT.md
  - 00-questions.md
  - 01-project-setup.md
  - 02-ui-identity.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - README.md
  - HANDOVER.md

packet_shape:
  style: phase_driven_comprehensive
  principle: YAML routes; markdown teaches and builds.
  required_files:
    - BUILDPRINT.md
    - 00-questions.md
    - 01-project-setup.md
    - 02-ui-identity.md
    - blueprint.yaml
    - 03-phases/phase-index.yaml
    - 03-phases/phase-flow.md
    - README.md
    - HANDOVER.md
  forbidden_shapes:
    - slices/
    - gates/
    - 02-architecture.md
    - 03-ux-contract.md
    - 04-handover.md
    - 04-review.md
    - 05-handover.md
    - generated/agent-prompt.md
    - generated/codex-handoff.md

phase_contract:
  required_headings:
    - How to implement this phase
    - Building objective
    - DO NOT
    - Minimum proof before moving on
    - Handoff note
  rule: Each phase must be an executable engineering brief with concrete user/operator loop, runtime contracts, persisted state, surface behavior, failure matrix, proof artifacts, and claim ceiling. Do not decompose phase guidance into tiny schema sections or slice YAML.
  forbidden_shapes:
    - slices/
    - gates/
    - 02-architecture.md
    - 03-ux-contract.md
    - 04-handover.md
    - 04-review.md
    - 05-handover.md
    - generated/agent-prompt.md
    - generated/codex-handoff.md

agent_contract:
  role: Senior Product Engineer
  rule: Build the agentic chat runtime honestly. Streaming, provider, tool, MCP, memory, subagent, telemetry, WebUI, and safety claims require direct proof or explicit blockers.

harness:
  provider: agents
  profiles:
    - webapp
    - backend
    - agentic
  selection_rule: Use only profiles that match this artifact. Do not expand to full unless broad coverage is explicitly worth the extra context.

central_output_contract:
  rule: The central output must be specific to Agentic Chat, not a generic shell with renamed labels.
  central_output: Durable real-model streaming conversation with provider/route/usage trace and actionable blocked states.
  output_primitives:
    - session and message records
    - incremental streaming turn events
    - provider route and credential posture
    - normalized provider usage telemetry
    - WebUI/API chat surface state
  quality_signals:
    - real model tokens stream before completion
    - unknown and unavailable providers are actionable, not silently substituted
    - messages and traces survive readback after restart
    - normalized failures retry within a bounded policy or block honestly
    - UI shows empty, streaming, blocked, error, and success states without log parsing
  unacceptable_generic_substitutes:
    - static chat mockup
    - deterministic echo presented as a real product turn
    - raw provider JSON as the main surface
    - in-memory-only state claimed as durable
    - silent fallback on unknown providers
    - generic dashboard replacing the chat surface
  reviewer_acceptance_questions:
    - Can the user send a turn and see real model tokens stream incrementally?
    - Can the operator inspect which provider/model/route and usage path was used?
    - Can blocked or failed providers recover safely within the retry policy?
    - Which paid-provider or hosting claims remain blocked?
  claim_gates:
    - real provider success requires a real streaming token trace, not the test double
    - paid provider success requires a configured key and response trace
    - durability requires persistence readback after restart or blocker
    - public hosting requires auth, abuse, and secrets proof
  minimum_standard: A user-selected real provider streams chat tokens incrementally through the provider interface; the turn is persisted, inspectable through route/usage/trace, and survives readback. The deterministic provider exists only as a test fixture, never as the delivered outcome.

typed_quality_gates:
  rule: Select only the gates that match the artifact type; do not copy every possible gate into every packet.
  ui_decision_precision:
    applies_when: artifact has human-facing UI, reports, generated outputs, visual workflows, forms, or operator surfaces
    requires:
      - explicit style direction and rejected adjacent styles
      - exact color tokens and status semantics
      - typography scale and usage
      - desktop/mobile layout model when responsive use is in scope
      - component and state language before UI implementation
  visual_viewport_acceptance:
    applies_when: artifact has responsive or browser/app UI
    requires:
      - desktop proof for the primary workflow
      - mobile or narrow-viewport proof when users may operate there
      - screenshot inspection for overlap, clipping, unreadable text, unreachable actions, and page-level horizontal overflow
  editor_stress_acceptance:
    applies_when: artifact renders editable, generated, document-like, fixed-format, long-form, visual, note, or report content
    requires:
      - long-title and long-body fixtures
      - fixed-surface framing or scroll ownership proof
      - edit/readback or state persistence proof when editing exists
  semantic_output_acceptance:
    applies_when: artifact generates, transforms, recommends, summarizes, analyzes, or composes output
    requires:
      - output-specificity check against central_output_contract
      - repeated-generic-output rejection
      - sample output review that states what the user/operator can do next
  integration_operator_acceptance:
    applies_when: artifact is a plugin, integration, CLI, service, worker, automation, API, or background job
    requires:
      - install/configure/first-action proof
      - error, retry, idempotency, logging, audit, and recovery expectations where relevant
      - explicit live-provider or external-side-effect blockers
  critical_review_pushback:
    applies_when: serious executable packet or user-facing artifact
    phase_id: 99-critical-review-pushback
    phase: 03-phases/critical-review-pushback.md
    pass_threshold: "50/60, every category 4 or 5, no unresolved high-severity finding"
    repair_loop: "up to five flaw -> fix -> proof -> rescore iterations unless externally blocked"

state_and_handoff:
  local_state_dir: .buildprint/
  setup_receipt: .buildprint/setup-receipt.md
  readme_template: README.md
  handover_template: HANDOVER.md

proven_implementation_requirements:
  rule: Use proven libraries, SDKs, runtimes, or platform services for hard product domains unless a from-scratch alternative is explicitly justified and proven against the same acceptance criteria.
  detect_from_source:
    - fixed-format export or rendering
    - rich text or inline editing
    - document parsing or ingestion
    - drag/reorder/canvas interaction
    - charts, diagrams, maps, timelines, code rendering, or visual primitives
    - live provider SDKs, OAuth, webhooks, external APIs, or local model runtimes
    - frontend UI runtime, stateful screen composition, component/state styling, responsive viewport proof, or design token enforcement
    - background jobs, export tasks, queues, retries, or long-running work
    - durable persistence, migrations, file/object storage, or sync
  selected_packet_must:
    - name hard domains that are source-derived product requirements
    - require a proven package/runtime/service category for each hard domain
    - keep implementation choices stack-neutral unless the source makes a specific stack part of the product contract
    - allow from-scratch alternatives only with explicit justification and proof equal to the proven tool path
    - record selected package/runtime choices in docs/architecture.md during setup
  stack_selection:
    note: The stack is stack-neutral and chosen by the user via 00-questions (provider/model, frontend/backend framework, persistence), then recorded in docs/architecture.md. Suggestions below are non-binding starting points, not mandates. The depth this packet enforces is stack-independent behavior (real-model floor, error taxonomy, bounded retry, cancellation, migration path), not a fixed toolset.
    provider_suggestions: local Ollama (free, no key) or any official/well-supported client (OpenAI, Anthropic, OpenRouter, Bedrock-compatible)
    transport_suggestion: any incrementally readable transport such as SSE or WebSocket
    persistence_suggestion: any durable store with a migration path such as SQLite
  product_domains:
    provider_abstraction:
      requirement: Use a local ChatProvider interface with a deterministic test double and official/well-supported clients for the user-selected real provider(s). The interface is required; the specific client/SDK is the user's choice.
    streaming_runtime:
      requirement: Implement incremental streaming over a transport selected in setup (SSE or equivalent) with trace, checkpoint, AbortSignal-style cancellation, timeout/error behavior, a bounded retry/backoff policy, and normalized usage events. Buffered-after-completion responses do not qualify.
    deferred_capabilities:
      requirement: Tools/skills, MCP policy, memory/compaction, and subagents are deferred to EXTENSIONS.md; do not build, stub, or claim them in 1.0. When implemented later they must use explicit allowlists, typed results, audit records, and blocked states.
    persistence_and_memory:
      requirement: Persist sessions, messages, traces, provider routes, and telemetry in the user-selected durable store with a migration path.
    frontend_ui_runtime:
      requirement: Use a proven frontend runtime for stateful chat UI composition; default to React + Vite + TypeScript unless an existing host framework is already proven.
    component_state_styling:
      requirement: Use a proven styling/design-system path for tokens, responsive states, and component variants; default to Tailwind CSS v4 + tokenized CSS variables unless an existing design system is already proven.
    responsive_viewport_proof:
      requirement: Prove desktop/tablet/mobile/narrow states with screenshots and viewport checks tied to docs/DESIGN.md and .buildprint/ui-evidence.md.
