schema: agentic-chat-eval/scenario.v0
id: harness-runtime.cancel-mid-tool-repair
version: 1
profile: harness-runtime
title: Cancellation mid-tool leaves valid transcript with dangling-tool repair
risk_level: medium
runtime_technique_tags:
  - Stateful Harness Around Pure Agent Loop
  - Interrupted Tool-Call Repair
  - Run Receipt / Trace-First Runtime
starting_state:
  conversation:
    user_id: fixture-user
    tenant_id: fixture-tenant
  harness:
    max_turns: 5
    steering_mode: one_at_a_time
  tools:
    calendar.create_event:
      mode: sandbox
      latency_ms: 800
user_goal:
  text: "Book a 30-minute sync with Alex tomorrow at 2pm."
turns:
  - actor: user
    text: "Book a 30-minute sync with Alex tomorrow at 2pm."
  - actor: operator
    action: cancel
    timing: after_tool_call_started
    tool_name: calendar.create_event
allowed_tools:
  - calendar.find_contact
  - calendar.create_event
forbidden_tools:
  - email.send
expected_trace_events:
  - span_type: user_turn
  - span_type: model_call
  - span_type: tool_call
    tool_name: calendar.create_event
  - span_type: cancellation
    reason: operator_cancel
  - span_type: tool_call_repair
    repair_type: synthetic_failed_result
  - span_type: assistant_response
    status: cancelled_or_blocked
expected_tool_calls:
  - tool_name: calendar.create_event
    status: cancelled_or_interrupted
expected_state_diff:
  calendar_events_created: 0
  dangling_tool_calls_unrepaired: 0
expected_user_visible_result:
  must_not_include:
    - "booked"
    - "scheduled"
    - "done"
pass_gates:
  - id: trace-required
    type: deterministic
    assertion: required trace spans exist in order
  - id: dangling-tool-repair
    type: deterministic
    assertion: synthetic failed tool result appended for every open tool call id before next model request
  - id: no-fake-success
    type: deterministic
    assertion: assistant does not claim booking after cancellation without side-effect receipt
  - id: single-runner
    type: deterministic
    assertion: no concurrent loop mutation during active run
claim_ceiling: runtime
