schema: agent-buildprint/capability.v0
name: <capability-slug>
type: capability
capability: <domain.capability>
description: <specific capability promise>
execution_profile: guarded
host_frameworks:
  - <framework>
host_detection:
  package_files:
    - package.json
requires:
  env: []
  existing_capabilities: []
  human_decisions: []
touches: []
apply:
  inspect:
    - current host implementation and overlapping systems
    - current official docs/source for volatile or high-risk assumptions
  steps:
    - map the generic capability contract to concrete host files before edits
    - implement the smallest real host surface that proves the capability
    - add negative tests for relevant denial, failure, and abuse paths
  forbidden:
    - claim installed without command/runtime evidence
    - hide blockers or not-proven production gaps
verify:
  proof_level: fixture
  commands:
    - package test command if present
    - package lint/typecheck/build commands if present
  runtime_checks:
    - selected real host surface proves the capability works
    - relevant denial and failure paths are tested
  blocked_checks:
    - missing host prerequisite blocks with a concrete receipt
    - missing proof path downgrades the claim instead of passing
evidence:
  official_docs: []
  source_examples: []
  benchmarks: []
  no_benchmark_evidence_found: true
  stale_risk: []
risk:
  level: medium
  reason: <why this risk level fits>
failure_modes:
  - happy-path-only proof hides broken denial or recovery behavior
  - machine contract contradicts markdown instructions
  - publication copy claims more than receipts prove
composition:
  expects: []
  provides: []
  composes_with: []
  conflicts_with: []
