schema: agent-buildprint/author.v0
name: capability-buildprint-author
type: buildprint-author
title: Buildprint Creator
description: Classifier and authoring workflow for routing greenfield products or creating valid Capability Buildprints from a capability idea, existing integration, vendor docs, or source repo.
creates:
  schema: agent-buildprint/capability.v0
  packet_type: capability-buildprint
canonical_start: BUILDPRINT.md
read_order:
  - BUILDPRINT.md
  - author.yaml
  - 00-request-classifier.md
  - 00-internet-deepsearch.md
  - 00-intake.md
  - 01-capability-boundary.md
  - 02-contract-authoring.md
  - 03-phase-authoring.md
  - 04-validation-and-publication.md
  - templates/capability-packet/
inputs:
  accepted:
    - greenfield product idea
    - capability idea
    - existing integration code
    - vendor documentation
    - source repository or folder
    - desired host framework family
routes:
  greenfield_product:
    when: request is a whole new product, app, SaaS, site, dashboard, internal tool, game, or agent system
    action: route to Product Buildprint / Buildprint Mapper OS with a short handoff
    do_not_create_capability_packet: true
  capability_buildprint:
    when: request is one reusable graft into an existing host project
    action: continue through internet deepsearch, intake, boundary, contract, phases, validation, and publication
  ambiguous:
    action: ask one classifier question before deepsearch or authoring
outputs:
  required:
    - BUILDPRINT.md
    - capability.yaml
    - compatibility.md
    - 00-host-assessment.md
    - 01-integration-plan.md
    - apply.md
    - 02-implementation-phases/01-contract-and-config.md
    - 02-implementation-phases/02-core-integration.md
    - 02-implementation-phases/03-host-wiring.md
    - 02-implementation-phases/04-user-operator-surface.md
    - 02-implementation-phases/05-verification-and-receipt.md
    - verify.md
    - README.md
internet_deepsearch_policy:
  required_when_user_context_is_thin: true
  goal: determine_best_current_technique_before_questions_or_authoring
  prefer:
    - project-local skill or alignment workflow
    - deep research tool or skill
    - source-driven-development workflow
    - official provider/framework docs
    - inspected source repository or examples
    - benchmark/comparison evidence when claims require it
  must_compare:
    - official provider/framework recommended path
    - maintained source examples or starter templates
    - common alternative techniques
    - benchmark/comparison evidence when available
  must_record:
    - selected technique and reason
    - rejected techniques and reasons
    - confidence level
    - sources, versions, or dates
    - "No benchmark evidence found when benchmark evidence is unavailable"
    - "No confident best technique found when sources are weak or conflicting"
  ask_only_for:
    - business/product decisions
    - secrets/account/provider access
    - risk/cost/migration tradeoffs
    - private repo/system permission
    - target host when not inferable
  benchmark_rule: cite benchmark evidence or write "No benchmark evidence found"; never invent numbers
quality_bar:
  - request classifier runs before deepsearch, intake, or authoring
  - greenfield products route to Product Buildprint / Buildprint Mapper OS instead of capability files
  - capability is bounded and reusable
  - internet deepsearch selects or downgrades the technique before broad questions or authoring
  - host detection is explicit
  - execution profile matches risk
  - apply phases are concrete enough to prevent freestyle implementation
  - verification proves the capability instead of file creation
  - receipt requirements are present
  - best-practice/current/proven claims are cited or downgraded
