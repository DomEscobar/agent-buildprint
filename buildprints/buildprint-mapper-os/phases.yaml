schema: agent-buildprint/phases.v3
canonical_start: BUILDPRINT.md
phases:
  - id: 00-safety-boundaries
    title: Safety and Boundaries
    inputs: [BUILDPRINT.md, policies/safety.md, plans/00-safety-boundaries.md]
    must_produce:
      - source read boundary
      - output write boundary
      - secret handling rule
    must_pass:
      - source project is not modified
      - no secret values are copied

  - id: 01-repo-census
    title: Safe Census
    inputs: [plans/01-repo-census.md, policies/quality.md]
    must_produce:
      - file tree and manifest hints
      - dependency/framework/script/deploy/test/env-name hints
      - CENSUS_HINT or PENDING_AGENT_DISCOVERY states only
    must_pass:
      - no product behavior, absence, parity, provider, or persistence claims from hints alone

  - id: 02-behavior-discovery
    title: Behavior Discovery
    inputs: [plans/02-system-map.md, CONTRACTS.md]
    must_produce:
      - behavior inventory
      - source-backed product obligations
      - questions and blockers
    must_pass:
      - every observed behavior has source grounding
      - unresolved behavior remains question or blocker

  - id: 03-candidate-selection
    title: Candidate Selection
    inputs: [plans/03-candidate-buildprints.md, plans/04-scope-decision.md, questions.md]
    must_produce:
      - selected candidate, explicit scope, full-suite target, or discovery-only blocker
      - readiness classification across the requested/selected surface
    must_pass:
      - no silent scope shrinkage
      - explicit exclusions are named

  - id: 04-source-distillation
    title: Product-Led Source Distillation
    inputs: [prompts/extract-selected.md, templates/]
    must_produce:
      - source-independent selected-buildprint executable Buildprint
      - product promise and central artifact
      - first usable loop and phase slices
      - honest boundaries and blockers
      - review and handover files
    must_pass:
      - selected output stays under selected-buildprint/
      - output includes BUILDPRINT.md, 01-questions.md, 02-project-setup.md, blueprint.yaml, 03-phases/phase-index.yaml, 03-phases/phase-flow.md, phase files, 04-review.md, 05-handover.md, and generated/agent-prompt.md
      - phase packets include product intention, build scope, quality bar, and do-not-ship failures
      - obsolete selected-output spine files are absent
      - proof/evidence bureaucracy is not emitted as the product-quality mechanism

  - id: 05-execution-planning
    title: Downstream Execution Planning
    inputs: [prompts/extract-selected.md, templates/executable-packet/]
    must_produce:
      - active phase and phase order
      - typed artifact phase-flow
      - local checks and review route
      - repair/escalation rules
    must_pass:
      - implementing agent can start from BUILDPRINT.md and phase-index without reading every phase upfront
      - implementation direction preserves product quality and honest blockers

  - id: 06-qualification
    title: Qualification
    inputs: [plans/07-validation-submission.md]
    must_produce:
      - structural validation result or blockers
      - product-review readiness statement
      - honest qualification label
    must_pass:
      - public wording is not misleading
      - selected output shape validation passes or blockers are recorded
