active_phase: 03-phases/00-product-system-alignment.md
deployment_posture: trusted_local
posture_allowed_values:
  - trusted_local
  - private_authenticated
  - public_webapp
status_allowed_values:
  - included
  - included_blocked
  - conditional
  - blocked
conditional_phase_rules:
  trusted_local: include posture-hardening phases as included_blocked with reason "trusted_local posture -- promote to private_authenticated or public_webapp to unlock"
  private_authenticated: include posture-hardening phases as included
  public_webapp: include posture-hardening phases as included with tenant/security depth
feature_slice_expansion_rule:
  mode: umbrella_or_n_split_slices
  umbrella_phase: 03-feature-slices
  split_phase_id_pattern: 03-feature-slice-NNN-<slice-id>
  dependency_rule: each split slice depends on the prior split slice or 03-feature-slices; 04-state-and-data depends on the final included slice
spine_phase_catalog:
  product_app_consumer_first:
    - 00-product-system-alignment
    - 01-shell-and-navigation
    - 02-core-loop-first
    - 03-feature-slices
    - 04-state-and-data
    - 05-domain-and-intelligence
    - 06-design-system-and-copy
    - 07-architecture-garden
    - 08-verification
  developer_first_framework:
    - 01-adoption-contract
    - 02-framework-seams
    - 03-first-host-action
    - 04-events-failures-observability
    - 05-examples-and-docs
  reliability_first_service:
    - 01-service-goal-slo
    - 02-state-machine-data-contracts
    - 03-happy-transaction
    - 04-retry-failure-recovery
    - 05-observability-admin-controls
    - 06-runbook-regression-verification
  automation_task_loop:
    - 01-task-contract
    - 02-approval-and-inputs
    - 03-first-task-run
    - 04-stop-conditions-and-recovery
    - 05-trace-and-handover
  data_pipeline_quality_loop:
    - 01-data-contracts
    - 02-ingestion-and-lineage
    - 03-transform-quality-loop
    - 04-quality-gates-and-recovery
    - 05-output-reproducibility
  infrastructure_operations_loop:
    - 01-operation-contract
    - 02-plan-apply-boundaries
    - 03-health-and-drift
    - 04-rollback-and-recovery
    - 05-runbook-and-release-gates
