# Slice definition — copy this to slices/<slice-id>/slice.yaml and fill in all fields.
# Runner reads this file. Do not add fields not defined here; add them to the schema instead.

id: slice-XX-name                    # unique, kebab-case, stable
title: One-line description          # human-readable
depends_on: []                       # list of slice ids that must be status:complete first
parallelizable_with: []              # slice ids that can run concurrently with this one
contract_version: ""                 # hash of 03-ux-contract.md at the time slice is defined; runner fills this

# Primary capsule injected as build system-prompt.
# Must be one of: product-architect, ux-ui-craft, data-persistence, integration-runtime, security-boundary
persona: ux-ui-craft

# Secondary capsules read-required but not system-prompt for this slice.
secondary_personas: []

# Path ids from 03-ux-contract.md#Path Map that this slice implements.
# Every id here must exist in the ux-contract Path Map. Runner enforces this.
paths: []

# core_proof_required: paths that the acceptance session must observe end-to-end.
# A path listed here with no passing acceptance row in acceptance-result.json makes the slice status: partial.
# "or blocker" is not a valid substitute — a blocked path is status: partial, not status: complete.
core_proof_required: []

# Notes for the runner / human operator. Not consumed by build or acceptance sessions.
notes: ""
