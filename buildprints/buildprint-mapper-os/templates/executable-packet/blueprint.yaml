schema_version: mapper-os/executable-blueprint
execution_start: BUILDPRINT.md
machine_contract: blueprint.yaml
claim_status: product_build_required
qualification_label: local_build_requires_review
setup_tier: typed_product_leadership
blueprint_mode:
  primary: product
  consumer: end_user
  selected_spine: product_app_consumer_first
  allowed_values:
    - product
    - framework
    - library
    - integration
    - automation
    - data-pipeline
    - infrastructure
    - mixed
  note: Replace primary, consumer, and selected_spine during extraction. Do not force non-product artifacts into product-app phases.
agent_contract:
  role: Senior Product Engineer
  rule: Build a usable artifact-type slice; do not produce proof theater.
read_order:
  - BUILDPRINT.md
  - 01-questions.md
  - generated/agent-prompt.md
  - 02-project-setup.md
  - blueprint.yaml
  - 03-phases/phase-index.yaml
  - 03-phases/phase-flow.md
  - 04-review.md
  - 05-handover.md
implementation_loop:
  phase_flow: 03-phases/phase-flow.md
  active_phase: 03-phases/00-product-system-alignment.md
  final_review: 04-review.md
  handover: 05-handover.md
repair_routing:
  product_contradiction: BUILDPRINT.md
  setup_or_architecture_gap: 02-project-setup.md
  phase_gap: current_phase
  review_gap: 04-review.md
  handover_gap: 05-handover.md
context:
  phase_index: 03-phases/phase-index.yaml
  active_phase: 03-phases/00-product-system-alignment.md
  agent_prompt: generated/agent-prompt.md
