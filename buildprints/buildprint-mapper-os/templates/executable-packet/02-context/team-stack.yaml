schema_version: mapper-os/team-stack.v2
selected_teams:
  - team: product-architect
    trigger_signals:
      - medium-large-full-suite scope
      - UI/API/service/provider/storage boundaries
    required_gates:
      - topology declared before coding
      - first real vertical slice reaches durable state or explicit blocker
      - UI-only shells and route-shaped handlers rejected
  - team: ux-ui-craft
    trigger_signals:
      - user-facing UI
      - browser workflow
      - dashboard, graph, report, visual editor, or operator console
    required_gates:
      - 02-context/ux-contract.md read before UI implementation
      - 02-context/design-quality-bar.md read before UI implementation
      - screenshot/browser proof for empty, loading, error, blocked, and success states
  - team: test-and-verification
    trigger_signals:
      - every selected output
    required_gates:
      - proof command or blocker for each capability
      - negative tests for risky state, provider, browser, and persistence paths
      - runtime evidence rows appended only to .buildprint/evidence/evidence-ledger.jsonl
  - team: integration-runtime
    trigger_signals:
      - providers, uploads, jobs, runtime, external side effects
    required_gates:
      - deterministic no-network provider default
      - live provider claims blocked until credentials and runtime proof exist
  - team: security-boundary
    trigger_signals:
      - auth, admin, user data, destructive actions, secrets, public deployment
    required_gates:
      - destructive actions disabled or locally confirmed
      - secrets never copied into package or proof artifacts
  - team: data-persistence
    trigger_signals:
      - project data, import/export, reports, graph/model state, restart behavior
    required_gates:
      - durable local persistence by default
      - restart/readback proof before persistence claims
review_order:
  - product-architect
  - ux-ui-craft
  - integration-runtime
  - security-boundary
  - data-persistence
  - test-and-verification
forbidden:
  - user-selected quality tiers
  - lazy/simple team choices
  - treating team gates as optional polish
  - reading unrelated capability packets upfront
