schema_version: mapper-os/security-test-fixtures.v1
fixtures:
  - id: upload_oversized_file_rejected
    surface: uploads
    expected: request is rejected with actionable error and no persisted partial project
  - id: upload_path_traversal_filename_rejected
    surface: uploads
    expected: filename is sanitized or rejected; no write outside storage root
  - id: wrong_mime_type_rejected
    surface: uploads
    expected: unsupported content type fails before provider/runtime calls
  - id: secret_like_value_redacted_from_logs
    surface: provider_logs
    expected: env-like or token-like values are redacted from logs, screenshots, reports, and ledger rows
  - id: destructive_delete_requires_confirmation
    surface: destructive_actions
    expected: project, graph, simulation, and report deletion require explicit confirmation and emit audit evidence
  - id: subprocess_runtime_allowlist_enforced
    surface: subprocess_runtime
    expected: simulation/runtime execution cannot invoke commands outside the approved adapter/worker boundary
  - id: generated_artifacts_secret_scan
    surface: proof_artifacts
    expected: proof artifacts pass a secret redaction scan before claim upgrade
