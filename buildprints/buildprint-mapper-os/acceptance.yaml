schema: agent-buildprint/acceptance.v2
canonical_start: BUILDPRINT.md
acceptance:
  safety:
    source_mutation: forbidden
    secret_values: never_copy
    env_var_names: allowed
  default_output:
    must_create_only:
      - discovery
      - evidence
      - quality
    must_not_create:
      - root implementation scaffold
      - selected-buildprint without scope decision
  selected_output:
    required_root:
      - BUILDPRINT.md
      - CAPABILITY_INDEX.md
      - CONTRACTS.md
      - VERIFICATION.md
      - EXECUTION_PROTOCOL.md
      - IMPLEMENTATION_PLAN.md
      - CURRENT_STATE.md
      - manifest.json
      - capabilities/
    required_capability_pack:
      - CAPABILITY.md
      - VERIFICATION.md
      - IMPLEMENTATION.md
    router_first_read_order:
      - BUILDPRINT.md
      - CAPABILITY_INDEX.md
      - CURRENT_STATE.md
      - EXECUTION_PROTOCOL.md
      - active capability pack only
    forbidden_default_files:
      - AGENT_EXECUTION_BRIEF.md
      - agent-contract.xml
      - TEST_MATRIX.md
      - TRACEABILITY_MATRIX.md
      - IMPLEMENTATION_COMPLETENESS.md
      - PHASE_PLAN.md
      - LOOP_GATES.md
    forbidden_typo_files:
      - VERFICATION.md
      - IMPLEMENATION.md
      - CAPABILTY_INDEX.md
    forbidden_duplicate_spine_sets:
      - [HANDOFF.md, HANDOVER.md]
    manifest_parity: required
  static_gates:
    - discover first and ask later
    - no broad pre-discovery questionnaire
    - census hints are not product facts
    - every OBSERVED claim cites source evidence
    - selected scope explicit before selected extraction
    - capability status classification complete
    - selected output manifest matches actual files
    - selected output has no typo alias files
    - selected output has exactly one canonical handoff artifact
    - no mocks or fixtures counted as product implementation
    - qualification label is DISCOVERY_ONLY, SELECTED_UNQUALIFIED, or QUALIFIED_SOURCE_INDEPENDENT
  required_reviews:
    - name: mapper_fixture_review
      command: manual or agent-based review of buildprints/buildprint-mapper-os/evals/golden-projects/
      required_when: mapper behavior, templates, or policies change
