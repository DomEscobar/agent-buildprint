quality_rubric:
  ui:
    pass: storyboard-first workbench with timeline, selected-shot inspector, task states, and export affordance
    fail: generic dashboard, static cards, raw manifest-first UI, no browser proof
  architecture:
    pass: separated UI, API/app boundary, domain services, adapters, persistence, proof harness
    fail: single-file shell, route-shaped handlers only, in-memory-only state
  proof:
    pass: evidence ledger rows with artifacts and negative tests
    fail: prose claims without commands/artifacts
  safety:
    pass: secrets redacted, no-network default, destructive actions gated
    fail: secret leakage, live provider default, ungated delete/reset

