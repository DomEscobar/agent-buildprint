proof_contract_id: proof-production-storyboard-flow
required_proofs:
  - provider_integration_proof
  - persistence_roundtrip
  - browser_runtime_trace
  - ux_design_gate
  - screenshot_state_set
commands:
  suggested:
    - npm test -- production-storyboard-flow
    - npm run test:browser -- production-storyboard-flow
negative_tests:
  - malformed storyboard output is rejected
  - saved flow reloads after restart
  - storyboard row without linked script/event/asset is blocked
evidence_ledger: .buildprint/evidence/evidence-ledger.jsonl
snapshot_evidence_seed: 09-evidence/evidence-ledger.jsonl
promotion_blockers:
  - no storyboard browser proof
  - no screenshots against 02-context/ux-contract.md and 02-context/design-quality-bar.md
  - no storyboard screenshot showing linked rows, timeline lanes, selected-shot inspector, and persisted readback
  - no flow restart/readback proof
