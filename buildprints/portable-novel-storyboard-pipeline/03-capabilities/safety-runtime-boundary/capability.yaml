capability_id: safety-runtime-boundary
status: INCLUDED_RISKY_REQUIRES_HARDENING
product_obligation_ids: [OBL-SAFETY]
source_surface_ids: [SRC-PROVIDERS, SRC-UPLOADS, SRC-ADMIN, SRC-RUNTIME]
autonomy_level: workflow
proof_contract: 03-capabilities/safety-runtime-boundary/proof-contract.yaml
stable:
  - secrets are configured by name and never printed
  - uploads are contained and MIME/type checked
  - destructive actions are confirmation/audit gated
  - live providers are optional and blocked from default proof
free:
  - exact secret storage backend
  - confirmation UI design
  - deployment target if later approved
stop_rules:
  - secret value appears in logs or manifest
  - destructive action lacks isolated fixture proof
  - provider VM/editable code executes without review

