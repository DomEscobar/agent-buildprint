proof_contract_id: proof-safety-runtime-boundary
required_proofs:
  - security_boundary_review
  - provider_integration_proof
  - clean_room_implementation_trace
commands:
  suggested:
    - npm test -- safety-runtime-boundary
    - npm run check:no-secrets
negative_tests:
  - secret values are redacted from logs and manifest
  - destructive reset cannot run without confirmation
  - upload path traversal is rejected
evidence_ledger: .buildprint/evidence/evidence-ledger.jsonl
snapshot_evidence_seed: 09-evidence/evidence-ledger.jsonl
promotion_blockers:
  - no security review
  - no no-secret/no-network proof
  - live provider proof unavailable

