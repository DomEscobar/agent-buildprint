schema: agent-buildprint/phases.v1
canonical_start: BUILDPRINT.md
phases:
  - id: 00-alignment
    title: Alignment
    inputs:
      - BUILDPRINT.md
      - DEFAULT_PRESET.md
      - questions.md
      - PRODUCT_QUALITY_BAR.md
      - claims.yaml
    must_produce:
      - recorded stack, persistence, provider mode, sample product, visual style, publish target
      - safe and unsafe claims copied into docs or visible limitations UI
      - explicit statement that full webapp proof is required and API-only proof cannot pass
    must_pass:
      - default studio preset used or questions.md answered and confirmed
    forbidden:
      - shrinking acceptance to backend-only or gallery-only proof
      - expanding into live providers before mock/no-network webapp works

  - id: 01-contracts-domain
    title: Contracts and Domain
    inputs:
      - SPEC.md
      - CONTRACTS.md
      - PROVIDER_ADAPTERS.md
      - ASYNC_JOB_MODEL.md
    must_produce:
      - canonical request/response schemas
      - provider adapter interfaces and deterministic mocks
      - domain models for analysis, scripts, actors, voices, jobs, output manifest, gallery, handoff
    must_pass:
      - contract tests for valid and invalid inputs
      - no-network default adapter tests
    forbidden:
      - raw provider responses as trusted domain state
      - fake provider success counted as live behavior

  - id: 02-runtime-jobs
    title: Runtime and Jobs
    inputs:
      - ASYNC_JOB_MODEL.md
      - TEST_MATRIX.md
    must_produce:
      - pending/running/success/failure/cancel/retry lifecycle
      - ordered logs, provider request records, error reasons, output manifest
      - local persistence with restart proof or explicit temporary-storage labeling
    must_pass:
      - restart/status recovery test or documented blocker
      - cancel/retry/failure tests
    forbidden:
      - in-memory-only state described as durable
      - missing error reasons for failed jobs

  - id: 03-media-pipeline
    title: Media Pipeline
    inputs:
      - MEDIA_PIPELINE_SPEC.md
      - PROVIDER_ADAPTERS.md
      - QA_PLAN.md
    must_produce:
      - fixture audio/subtitle/b-roll/composition path
      - playable local MP4 output
      - ffprobe metadata evidence
    must_pass:
      - 1080x1920 dimension probe
      - nonblank output check
      - subtitle escaping and b-roll timing tests
    forbidden:
      - solid-color-only or blank video accepted as media proof
      - provider text passed unsafely into FFmpeg filters

  - id: 04-webapp-studio
    title: Webapp Studio
    inputs:
      - WEBAPP_TARGET_SPEC.md
      - WORKBENCH_UX_SPEC.md
      - PRODUCT_QUALITY_BAR.md
      - BROWSER_QA_SCENARIOS.md
      - HEAD_TO_FOOT_QA.md
    must_produce:
      - source input, analysis/scripts, configuration, progress, review/player, gallery, publish handoff workflows
      - populated studio UI with limitations secondary
      - visible failure/retry/consent states
    must_pass:
      - real browser happy path clicks rendered controls
      - completed-state desktop and mobile screenshots
      - negative browser scenarios or documented blockers
    forbidden:
      - no-op controls counted as implemented
      - raw JSON/reporting UI as primary result
      - empty-state screenshot accepted as proof

  - id: 05-validation-claims
    title: Validation and Claims
    inputs:
      - acceptance.yaml
      - claims.yaml
      - PARITY_CLAIMS.md
      - VALIDATION_TEMPLATE.md
    must_produce:
      - validation report
      - build/test/browser command summary
      - screenshot and MP4 probe evidence
      - explicit gaps and final status
    must_pass:
      - claim wording check
      - secret scan
      - acceptance checklist
    forbidden:
      - hiding known gaps
      - claiming provider/platform/rendering parity without evidence
