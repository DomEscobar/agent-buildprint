name: Dispatch website Buildprint sync

on:
  push:
    branches: [ main ]
    paths:
      - 'buildprints/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'bin/**'
      - '.github/workflows/dispatch-website-sync.yml'
  workflow_dispatch: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch agent-buildprint-website sync
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          gh api repos/DomEscobar/agent-buildprint-website/dispatches \
            --method POST \
            -f event_type=buildprints-updated \
            -F client_payload[source_repo]=DomEscobar/agent-buildprint \
            -F client_payload[source_sha]="$SOURCE_SHA"
